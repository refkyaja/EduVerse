<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduQuest — Main Ujian</title>
  <meta name="description" content="Arena ujian EduQuest. Jawab soal, gunakan power-up, dan raih XP sebanyak mungkin.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            background: 'rgba(var(--background), <alpha-value>)',
            foreground: 'rgba(var(--foreground), <alpha-value>)',
            card: { DEFAULT: 'rgba(var(--card), <alpha-value>)', foreground: 'rgba(var(--card-foreground), <alpha-value>)' },
            primary: { DEFAULT: 'rgba(var(--primary), <alpha-value>)', foreground: 'rgba(var(--primary-foreground), <alpha-value>)', glow: 'rgba(var(--primary-glow), <alpha-value>)' },
            muted: { DEFAULT: 'rgba(var(--muted), <alpha-value>)', foreground: 'rgba(var(--muted-foreground), <alpha-value>)' },
            border: 'rgba(var(--border), <alpha-value>)',
            'dark-surface': 'rgba(var(--dark-surface), <alpha-value>)',
            'brand-soft': 'rgba(var(--brand-soft), <alpha-value>)',
            success: 'rgba(var(--success), <alpha-value>)',
            warning: 'rgba(var(--warning), <alpha-value>)',
            danger: 'rgba(var(--danger), <alpha-value>)',
            'xp-gold': 'rgba(var(--xp-gold), <alpha-value>)',
            'brand-blue': 'rgba(var(--brand-blue), <alpha-value>)',
          },
          boxShadow: { glow: '0 10px 40px -10px rgba(178, 59, 231, 0.5)' },
          animation: {
            'fade-in': 'fade-in 0.4s ease-out',
            'scale-in': 'scale-in 0.2s ease-out',
            'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
            float: 'float 4s ease-in-out infinite',
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f2f1f5] dark:bg-[#121016] min-h-screen flex justify-center items-start">

  <!-- Mobile Wrapper — no topbar / bottomnav during quiz -->
  <div id="quiz-wrapper" class="min-h-screen w-full max-w-md bg-background relative shadow-2xl flex flex-col overflow-x-hidden border-x border-border/40">
    <!-- Entire content rendered by JS -->
    <div id="quiz-play-content" class="flex-1 flex flex-col"></div>

    <!-- Review Modal -->
    <div id="review-overlay" onclick="closeReviewModal()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden"></div>
    <div id="review-modal" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-card rounded-t-3xl z-50 translate-y-full transition-transform duration-500 ease-out shadow-2xl">
      <div class="flex justify-center pt-4 pb-2">
        <div class="w-10 h-1 rounded-full bg-border"></div>
      </div>
      <div class="px-5 pb-3 flex items-center justify-between border-b border-border">
        <h2 class="font-extrabold text-lg">Review Jawaban</h2>
        <button onclick="closeReviewModal()" class="w-9 h-9 rounded-xl bg-muted flex items-center justify-center hover:bg-muted/80 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div id="review-modal-body" class="px-5 py-4 space-y-4 overflow-y-auto max-h-[70vh] pb-10">
      </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-overlay" onclick="closeConfirmModal()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden"></div>
    <div id="confirm-modal" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-card rounded-t-3xl z-50 translate-y-full transition-transform duration-500 ease-out shadow-2xl">
      <div class="flex justify-center pt-4 pb-2">
        <div class="w-10 h-1 rounded-full bg-border"></div>
      </div>
      <div id="confirm-modal-body" class="px-5 py-6 space-y-5">
      </div>
    </div>
  </div>

  <!-- Shared JS -->
  <script src="js/shared.js"></script>

        container.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-dark-surface via-primary to-dark-surface text-primary-foreground flex flex-col items-center justify-center px-6 overflow-hidden relative">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.15),transparent_60%)]"></div>
            <div class="relative text-center">
              <p class="text-[11px] font-extrabold uppercase tracking-[0.3em] text-white/70">
                ${done ? 'Power-up kamu' : 'Mengundi power-up...'}
              </p>
              <h1 class="text-2xl font-extrabold italic mt-2">
                ${done ? 'Siap Tempur!' : 'Putar Roda Takdir'}
              </h1>
              <div class="flex gap-3 mt-10 justify-center">
                ${slotsHtml}
              </div>
              ${done ? '<p class="text-sm text-white/80 mt-10 animate-fade-in">Memasuki arena...</p>' : ''}
            </div>
          </div>
        `;
      }

      // ── PLAYING ──────────────────────────────────────────────
      else if (quizPhase === 'playing') {
        const q               = quizQuestions[currentQuestionIdx];
        const isDouble        = doublePointsForQuestion[currentQuestionIdx];
        const isDoubt         = markedDoubt[currentQuestionIdx];
        const isHintShown     = hintShownForQuestion[currentQuestionIdx];
        const elim            = eliminatedOptionsForQuestion[currentQuestionIdx] || [];
        const progressPercent = ((currentQuestionIdx + 1) / quizQuestions.length) * 100;

        // Options
        const optionsHtml = q.options.map((opt, idx) => {
          const removed  = elim.includes(idx);
          const selected = userAnswers[currentQuestionIdx] === idx;
          let btnClass, badgeClass, textClass;
          if (removed)       { btnClass = "opacity-30 line-through bg-muted border-border cursor-not-allowed"; badgeClass = "bg-muted text-muted-foreground"; textClass = "text-muted-foreground"; }
          else if (selected) { btnClass = "border-primary bg-primary/5 shadow-glow"; badgeClass = "bg-primary text-primary-foreground"; textClass = "text-primary"; }
          else               { btnClass = "bg-card border-border hover:border-primary/40"; badgeClass = "bg-muted text-muted-foreground"; textClass = ""; }
          return `
            <button ${removed ? 'disabled' : ''} onclick="selectQuizOption(${idx})"
              class="w-full p-4 text-left rounded-2xl border-2 transition-all flex items-center gap-3 ${btnClass}">
              <span class="w-8 h-8 rounded-lg grid place-items-center text-xs font-extrabold shrink-0 ${badgeClass}">${String.fromCharCode(65 + idx)}</span>
              <span class="text-sm font-bold ${textClass}">${opt}</span>
            </button>
          `;
        }).join('');

        // Power-ups dock
        const powerupsDockHtml = POWERUPS_DEFINITIONS.filter(pu => unlockedPowerups.includes(pu.id)).map(pu => {
          const used = usedPowerups.includes(pu.id);
          return `
            <button ${used ? 'disabled' : ''} onclick="useActiveQuizPowerup('${pu.id}')"
              class="relative shrink-0 w-16 h-16 rounded-2xl border-2 flex flex-col items-center justify-center gap-1 transition-all ${pu.color} ${used ? 'opacity-20 grayscale cursor-not-allowed' : 'active:scale-90 cursor-pointer'}">
              <i data-lucide="${pu.Icon}" class="w-5 h-5" stroke-width="2.4"></i>
              <span class="text-[9px] font-extrabold uppercase">${pu.name}</span>
            </button>
          `;
        }).join('');

        // Next / Submit button
        const isLast = currentQuestionIdx === quizQuestions.length - 1;
        const nextBtnHtml = isLast
          ? `<button onclick="openQuizReviewOverlay()" class="flex-1 h-12 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white flex items-center justify-center gap-1.5 font-bold text-xs active:scale-95 transition-all shadow-glow shadow-emerald-500/20">
               Selesai <i data-lucide="chevron-right" class="w-4 h-4 text-white"></i>
             </button>`
          : `<button onclick="nextQuizQuestion()" class="flex-1 h-12 rounded-2xl bg-emerald-100 dark:bg-emerald-950/40 text-emerald-800 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-900/60 flex items-center justify-center gap-1.5 font-bold text-xs active:scale-95 transition-all hover:bg-emerald-200/80">
               Selanjutnya <i data-lucide="chevron-right" class="w-4 h-4 text-emerald-800 dark:text-emerald-300"></i>
             </button>`;

        container.innerHTML = `
          <!-- Quiz Header -->
          <header class="sticky top-0 bg-background/90 backdrop-blur-xl border-b border-border px-4 py-2 z-30">
            <div class="flex items-center justify-between">
              <button onclick="confirmExitQuiz()" class="w-9 h-9 rounded-xl bg-muted flex items-center justify-center hover:bg-muted/80 transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
              </button>
              <div class="text-center">
                <p class="text-[10px] font-bold text-muted-foreground uppercase tracking-widest">${meta.subject}</p>
                <p class="text-xs font-extrabold">${meta.chapter}</p>
              </div>
              <button onclick="openQuizReviewOverlay()" class="bg-card border border-border/80 hover:border-primary/30 transition-all rounded-full px-3 py-1.5 flex items-center gap-2 shadow-sm active:scale-95">
                <i data-lucide="layout-grid" class="w-4 h-4 text-foreground"></i>
                <span class="text-xs font-bold text-foreground font-mono leading-none">${currentQuestionIdx + 1}/${quizQuestions.length}</span>
              </button>
            </div>
          </header>

          <!-- Progress bar -->
          <div class="h-1 w-full bg-muted overflow-hidden">
            <div class="h-full bg-gradient-to-r from-primary to-primary-glow rounded-full transition-all duration-300" style="width:${progressPercent}%"></div>
          </div>

          <!-- Question + Options -->
          <main class="flex-1 px-4 py-6 flex flex-col justify-between">
            <div class="space-y-5 animate-fade-in">
              <div class="flex items-center gap-2">
                ${isDouble ? '<span class="px-2.5 py-1 bg-primary/10 text-primary rounded-full text-[10px] font-extrabold uppercase tracking-wider">⚡ 2x Poin</span>' : ''}
              </div>
              <h1 class="text-xl font-extrabold leading-snug text-balance">${q.q}</h1>

              ${isHintShown ? `
                <div class="bg-warning/10 border border-warning/30 rounded-xl p-3 flex gap-2 animate-fade-in">
                  <i data-lucide="lightbulb" class="w-4 h-4 text-warning shrink-0 mt-0.5"></i>
                  <p class="text-xs font-medium">${q.hint}</p>
                </div>` : ''}

              <div class="space-y-2.5">${optionsHtml}</div>
            </div>

            <!-- Footer: Power-ups + Navigation -->
            <div class="mt-6 space-y-4">
              <div class="space-y-2">
                <p class="text-[10px] font-extrabold text-muted-foreground uppercase tracking-widest">Power-Up</p>
                <div class="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">${powerupsDockHtml}</div>
              </div>

              <!-- Navigation Row: [Prev] [Ragu-ragu] [Selanjutnya/Selesai] -->
              <div class="flex gap-2.5 pt-2 items-center">
                <button onclick="prevQuizQuestion()" ${currentQuestionIdx === 0 ? 'disabled' : ''}
                  class="w-12 h-12 rounded-2xl bg-card border border-border text-foreground flex items-center justify-center shrink-0 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100 transition-all hover:border-primary/20">
                  <i data-lucide="chevron-left" class="w-5 h-5 text-foreground"></i>
                </button>

                <button onclick="toggleQuizQuestionDoubt()"
                  class="flex-1 h-12 rounded-2xl border-2 border-warning bg-card text-warning flex items-center justify-center gap-2 font-bold text-xs active:scale-95 transition-all shadow-sm">
                  <i data-lucide="${isDoubt ? 'check-square' : 'square'}" class="w-4 h-4 text-warning"></i>
                  Ragu-ragu
                </button>

                ${nextBtnHtml}
              </div>
            </div>
          </main>
        `;
      }

      // ── FINISHED ─────────────────────────────────────────────
      else if (quizPhase === 'finished') {
        let correctCount = 0, earnedXp = 0;
        quizQuestions.forEach((q, idx) => {
          if (userAnswers[idx] === q.correct) {
            correctCount++;
            earnedXp += doublePointsForQuestion[idx] ? 20 : 10;
          }
        });
        const accuracy = Math.round((correctCount / quizQuestions.length) * 100);

        // Update global state
        appState.xp            += earnedXp;
        appState.examsCompleted += 1;
        appState.correctAnswers += correctCount;
        saveState();

        container.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-primary via-primary to-primary-glow text-primary-foreground flex flex-col justify-center items-center px-6">
            <div class="flex-1 max-w-xs w-full py-16 flex flex-col items-center justify-center text-center animate-scale-in">
              <i data-lucide="sparkles" class="w-16 h-16 text-xp-gold drop-shadow-lg animate-bounce"></i>
              <h1 class="text-4xl font-extrabold italic mt-4">Selesai!</h1>
              <p class="text-primary-foreground/80 mt-1">Hasil ujian ${meta.chapter}</p>

              <div class="grid grid-cols-3 gap-3 mt-8 w-full">
                <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl p-4 text-center">
                  <p class="text-white/70 text-[10px] font-extrabold uppercase tracking-widest">Benar</p>
                  <p class="text-2xl font-extrabold italic mt-1 tabular-nums">${correctCount}/${quizQuestions.length}</p>
                </div>
                <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl p-4 text-center">
                  <p class="text-white/70 text-[10px] font-extrabold uppercase tracking-widest">Akurasi</p>
                  <p class="text-2xl font-extrabold italic mt-1 tabular-nums">${accuracy}%</p>
                </div>
                <div class="bg-xp-gold text-dark-surface rounded-2xl p-4 text-center shadow-lg">
                  <p class="text-dark-surface/70 text-[10px] font-extrabold uppercase tracking-widest">+XP</p>
                  <p class="text-2xl font-extrabold italic mt-1 tabular-nums">${earnedXp}</p>
                </div>
              </div>

              <div class="w-full mt-8 space-y-2">
                <a href="index.html" class="block w-full bg-white text-primary font-extrabold py-4 rounded-2xl shadow-lg text-center active:scale-95 hover:bg-slate-50 transition-all">
                  Kembali ke Beranda
                </a>
                <a href="leaderboard.html" class="block w-full bg-white/10 border border-white/20 text-white font-bold py-3 rounded-2xl backdrop-blur-sm text-center active:scale-95 transition-all">
                  Lihat Leaderboard
                </a>
              </div>
            </div>
          </div>
        `;
      }

      lucide.createIcons();
    }

    // ─── POWERUP RAFFLE ──────────────────────────────────────────
    function startPowerupRaffle() {
      quizPhase = 'rolling';
      renderQuizPlayContent();

      const powerups = POWERUPS_DEFINITIONS.map(p => p.id);
      const raffleInterval = setInterval(() => {
        rollItems = [
          powerups[Math.floor(Math.random() * powerups.length)],
          powerups[Math.floor(Math.random() * powerups.length)],
          powerups[Math.floor(Math.random() * powerups.length)]
        ];
        renderQuizPlayContent();
      }, 80);

      setTimeout(() => {
        clearInterval(raffleInterval);
        const shuffled   = [...powerups].sort(() => Math.random() - 0.5);
        unlockedPowerups = shuffled.slice(0, 3);
        rollItems        = [...unlockedPowerups];
        renderQuizPlayContent();

        setTimeout(() => {
          quizPhase = 'playing';
          renderQuizPlayContent();
        }, 1400);
      }, 2200);
    }

    // ─── ACTIONS ─────────────────────────────────────────────────
    function selectQuizOption(idx)    { userAnswers[currentQuestionIdx] = idx; renderQuizPlayContent(); }
    function toggleQuizQuestionDoubt(){ markedDoubt[currentQuestionIdx] = !markedDoubt[currentQuestionIdx]; renderQuizPlayContent(); }
    function prevQuizQuestion()       { if (currentQuestionIdx > 0)                          { currentQuestionIdx--; renderQuizPlayContent(); } }
    function nextQuizQuestion()       { if (currentQuestionIdx < quizQuestions.length - 1)   { currentQuestionIdx++; renderQuizPlayContent(); } }
    function openQuizReviewOverlay() {
      const answeredCount = Object.keys(userAnswers).length;
      const gridBtnsHtml = quizQuestions.map((_, idx) => {
        const hasAns  = userAnswers[idx] !== undefined;
        const isDoubt = markedDoubt[idx];
        let btnClass  = isDoubt ? "bg-warning/20 border-warning text-warning"
                      : hasAns  ? "bg-primary text-primary-foreground border-primary"
                      :           "bg-card border-border text-muted-foreground";
        return `
          <button onclick="jumpToQuizQuestion(${idx})"
            class="aspect-square rounded-xl font-extrabold text-sm border-2 transition-all grid place-items-center ${btnClass}">
            ${idx + 1}
          </button>`;
      }).join('');

      document.getElementById('review-modal-body').innerHTML = `
        <div class="grid grid-cols-5 gap-2">${gridBtnsHtml}</div>
        <div class="space-y-2 text-xs text-muted-foreground">
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-primary"></div><span>Dijawab</span></div>
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-warning"></div><span>Ragu-ragu</span></div>
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-card border border-border"></div><span>Belum dijawab</span></div>
        </div>
        <p class="text-center text-sm text-muted-foreground">
          Sudah menjawab <span class="font-extrabold text-foreground">${answeredCount}/${quizQuestions.length}</span> soal
        </p>
        <button onclick="submitQuizFinished()"
          class="w-full py-4 rounded-2xl bg-primary text-primary-foreground font-extrabold text-sm shadow-glow active:scale-95 hover:scale-[1.01] transition-all">
          Submit
        </button>
      `;

      const overlay = document.getElementById('review-overlay');
      const modal   = document.getElementById('review-modal');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          modal.style.transform = 'translateX(-50%) translateY(0)';
        });
      });
      if (window.lucide) lucide.createIcons();
    }

    function closeReviewModal() {
      const overlay = document.getElementById('review-overlay');
      const modal   = document.getElementById('review-modal');
      modal.style.transform = 'translateX(-50%) translateY(100%)';
      setTimeout(() => overlay.classList.add('hidden'), 400);
    }

    function resumeQuizPlay()       { closeReviewModal(); }
    function jumpToQuizQuestion(idx){ currentQuestionIdx = idx; closeReviewModal(); }

    function showConfirmModal({ title, message, confirmText, onConfirm }) {
      document.getElementById('confirm-modal-body').innerHTML = `
        <div class="text-center">
          <div class="w-14 h-14 rounded-2xl bg-danger/10 grid place-items-center mx-auto">
            <i data-lucide="alert-triangle" class="w-7 h-7 text-danger" stroke-width="2.2"></i>
          </div>
          <h3 class="font-extrabold text-lg mt-3">${title}</h3>
          <p class="text-sm text-muted-foreground mt-1">${message}</p>
        </div>
        <div class="flex gap-3">
          <button onclick="closeConfirmModal()"
            class="flex-1 h-12 rounded-2xl bg-card border border-border font-bold text-sm hover:bg-muted transition-all active:scale-95">
            Batal
          </button>
          <button id="confirm-action-btn"
            class="flex-1 h-12 rounded-2xl bg-danger text-white font-extrabold text-sm shadow-lg active:scale-95 transition-all">
            ${confirmText}
          </button>
        </div>
      `;

      const overlay = document.getElementById('confirm-overlay');
      const modal   = document.getElementById('confirm-modal');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          modal.style.transform = 'translateX(-50%) translateY(0)';
        });
      });

      document.getElementById('confirm-action-btn').onclick = () => {
        closeConfirmModal();
        onConfirm();
      };
      if (window.lucide) lucide.createIcons();
    }

    function closeConfirmModal() {
      const overlay = document.getElementById('confirm-overlay');
      const modal   = document.getElementById('confirm-modal');
      modal.style.transform = 'translateX(-50%) translateY(100%)';
      setTimeout(() => overlay.classList.add('hidden'), 400);
    }

    function submitQuizFinished() {
      showConfirmModal({
        title: 'Kumpulkan Jawaban?',
        message: 'Pastikan semua jawaban sudah diisi. Soal yang belum dijawab akan dianggap kosong.',
        confirmText: 'Ya, Kumpulkan',
        onConfirm: () => {
          quizPhase = 'finished';
          renderQuizPlayContent();
        }
      });
    }

    function confirmExitQuiz() {
      showConfirmModal({
        title: 'Keluar dari Ujian?',
        message: 'Semua progres jawaban akan hilang dan tidak bisa dikembalikan.',
        confirmText: 'Keluar',
        onConfirm: () => {
          window.location.href = 'quiz.html';
        }
      });
    }

    function useActiveQuizPowerup(powerupId) {
      if (usedPowerups.includes(powerupId)) return;
      if (powerupId === 'hint') {
        hintShownForQuestion[currentQuestionIdx] = true;
      } else if (powerupId === 'fifty') {
        const correct  = quizQuestions[currentQuestionIdx].correct;
        const wrongOpts = quizQuestions[currentQuestionIdx].options
          .map((_, i) => i).filter(i => i !== correct)
          .sort(() => Math.random() - 0.5).slice(0, 2);
        eliminatedOptionsForQuestion[currentQuestionIdx] = wrongOpts;
      } else if (powerupId === 'combo') {
        doublePointsForQuestion[currentQuestionIdx] = true;
      }
      usedPowerups.push(powerupId);
      renderQuizPlayContent();
    }
  </script>
</body>
</html>
