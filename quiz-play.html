<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduQuest — Main Ujian</title>
  <meta name="description" content="Arena ujian EduQuest. Jawab soal, gunakan power-up, dan raih XP sebanyak mungkin.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            background: 'rgba(var(--background), <alpha-value>)',
            foreground: 'rgba(var(--foreground), <alpha-value>)',
            card: { DEFAULT: 'rgba(var(--card), <alpha-value>)', foreground: 'rgba(var(--card-foreground), <alpha-value>)' },
            primary: { DEFAULT: 'rgba(var(--primary), <alpha-value>)', foreground: 'rgba(var(--primary-foreground), <alpha-value>)', glow: 'rgba(var(--primary-glow), <alpha-value>)' },
            muted: { DEFAULT: 'rgba(var(--muted), <alpha-value>)', foreground: 'rgba(var(--muted-foreground), <alpha-value>)' },
            border: 'rgba(var(--border), <alpha-value>)',
            'dark-surface': 'rgba(var(--dark-surface), <alpha-value>)',
            'brand-soft': 'rgba(var(--brand-soft), <alpha-value>)',
            success: 'rgba(var(--success), <alpha-value>)',
            warning: 'rgba(var(--warning), <alpha-value>)',
            danger: 'rgba(var(--danger), <alpha-value>)',
            'xp-gold': 'rgba(var(--xp-gold), <alpha-value>)',
            'brand-blue': 'rgba(var(--brand-blue), <alpha-value>)',
          },
          boxShadow: { glow: '0 10px 40px -10px rgba(178, 59, 231, 0.5)' },
          animation: {
            'fade-in': 'fade-in 0.4s ease-out',
            'scale-in': 'scale-in 0.2s ease-out',
            'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
            float: 'float 4s ease-in-out infinite',
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f2f1f5] dark:bg-[#121016] min-h-screen flex justify-center items-start">

  <!-- Mobile Wrapper — no topbar / bottomnav during quiz -->
  <div id="quiz-wrapper" class="min-h-screen w-full max-w-md bg-background relative shadow-2xl flex flex-col overflow-x-hidden border-x border-border/40">
    <!-- Entire content rendered by JS -->
    <div id="quiz-play-content" class="flex-1 flex flex-col"></div>

    <!-- Review Modal -->
    <div id="review-overlay" onclick="closeReviewModal()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden"></div>
    <div id="review-modal" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-card rounded-t-3xl z-50 translate-y-full transition-transform duration-500 ease-out shadow-2xl">
      <div class="flex justify-center pt-4 pb-2">
        <div class="w-10 h-1 rounded-full bg-border"></div>
      </div>
      <div class="px-5 pb-3 flex items-center justify-between border-b border-border">
        <h2 class="font-extrabold text-lg">Review Jawaban</h2>
        <button onclick="closeReviewModal()" class="w-9 h-9 rounded-xl bg-muted flex items-center justify-center hover:bg-muted/80 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div id="review-modal-body" class="px-5 py-4 space-y-4 overflow-y-auto max-h-[70vh] pb-10">
      </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-overlay" onclick="closeConfirmModal()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden"></div>
    <div id="confirm-modal" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-card rounded-t-3xl z-50 translate-y-full transition-transform duration-500 ease-out shadow-2xl">
      <div class="flex justify-center pt-4 pb-2">
        <div class="w-10 h-1 rounded-full bg-border"></div>
      </div>
      <div id="confirm-modal-body" class="px-5 py-6 space-y-5">
      </div>
    </div>
  </div>

  <!-- Shared JS -->
  <script src="js/shared.js"></script>

        { q: "Which types of files can be publicly hosted on an Amazon S3 static website?", options: ["HTML files","Image files","Security policies","Network keys","Personally identifiable information"], correct: 0, hint: "S3 static website mendukung file HTML dan gambar." },
        { q: "A developer wants to store 10 years of data logs cost efficiently. Which service can support this workload?", options: ["Amazon S3","Amazon FSx","Amazon Elastic File System (Amazon EFS)","Amazon Elastic Block Store (Amazon EBS)"], correct: 0, hint: "Amazon S3 adalah penyimpanan objek yang hemat biaya untuk data jangka panjang." },
        { q: "A junior architect has overwritten a document in an S3 bucket by mistake. They want to prevent this from happening in the future. Which feature of Amazon S3 should they implement?", options: ["S3 versioning","Multi-part upload","S3 lifecycle policy","Cross-origin resource sharing (CORS)"], correct: 0, hint: "S3 Versioning menyimpan riwayat versi objek untuk pemulihan." },
        { q: "A company wants to reduce the storage costs of items that they access regularly but do not need instant access to. Which Amazon S3 storage class best fits this need?", options: ["S3 Standard-Infrequent Access (S3 Standard-IA)","S3 Standard","S3 on Outposts","S3 Glacier Instant Retrieval"], correct: 0, hint: "S3 Standard-IA cocok untuk data yang jarang diakses tapi tetap tersedia." },
        { q: "A company is required to keep customer data for 10 years for regulatory compliance. How can they transition data between storage classes without using manual processes?", options: ["Amazon S3 lifecycle policy","Amazon S3 Transfer Acceleration","Amazon S3 bucket policy","AWS Transfer Family"], correct: 0, hint: "S3 Lifecycle policy mengotomatiskan transisi antar kelas penyimpanan." },
        { q: "A developer wants to grant secure long-term access to an S3 bucket across several AWS accounts. Which option can they use to grant secure long-term access to this S3 bucket?", options: ["Bucket policy","Client-side encryption","Preassigned URLs","Block Public Access feature"], correct: 0, hint: "Bucket policy dapat memberikan akses antar akun AWS." },
        { q: "A company is launching a Linux instance that will be used for batch processing. They want to select an instance type that is best suited for the workload. Which instance type should they choose when launching the instance?", options: ["Compute optimized instance type","General purpose instance type","Accelerated computing instance type","Memory optimized instance type"], correct: 0, hint: "Compute optimized cocok untuk batch processing dan workload komputasi." },
        { q: "A company is launching a Linux instance that will be used to host a high-performing Redis database. They want to select an instance type that is best suited for the workload. Which instance type should they choose when they launch the instance?", options: ["Memory optimized instance type","High performance optimized instance type","Accelerated computing instance type","Compute optimized instance type"], correct: 0, hint: "Memory optimized cocok untuk database in-memory seperti Redis." },
        { q: "A company needs to launch 300 Linux EC2 instances. All 300 Linux instances need to have access to shared files. Which storage solution should they choose to share files among the 300 Linux instances?", options: ["Amazon Elastic File System (Amazon EFS)","Amazon Elastic Block Store (Amazon EBS)","Amazon FSx for Windows File Server","Amazon instance store"], correct: 0, hint: "EFS adalah file system NFS yang dapat diakses banyak instance Linux." },
        { q: "A company need to launch a Linux instance that will host a database. The instance needs to stop on occasion to perform maintenance tasks. Which storage solution should they choose for the data?", options: ["Amazon Elastic Block Store (Amazon EBS)","Amazon Elastic File System (Amazon EFS)","Amazon FSx for Windows File Server","Amazon instance store"], correct: 0, hint: "EBS adalah block storage persisten yang dapat dilepas dan dipasang ulang." },
        { q: "A company has a non-time-critical workload that can be stopped and restarted. They want to keep costs as low as they can for this workload. Which pricing option should they choose?", options: ["Amazon EC2 Spot Instances","On-Demand Instances","Savings Plans Instances","Dedicated Instances"], correct: 0, hint: "Spot Instances menawarkan diskon besar untuk workload yang dapat diinterupsi." },
        { q: "An architect needs an EC2 instance that runs for at least 1 year. In that year, the needs of the workload might change to require that the instance be moved to a new Region. They must keep costs low and guarantee that the computing cost will remain the same if the Region changes. Which pricing option should they choose?", options: ["Compute Savings Plans","EC2 Instance Savings Plans","Reserved Instances","On-Demand Instances"], correct: 0, hint: "Compute Savings Plans fleksibel lintas Region dan instance family." },
        { q: "A company is running a multi-tier application. Amazon EC2 instances run the web tier, and Amazon RDS for Microsoft SQL Server is used for the database tier. The database is experiencing very high load when running weekly reports. How can the company improve database performance with the LEAST administrative effort?", options: ["Create read replicas and configure the reports to use these new endpoints.","Convert the RDS database to Amazon DynamoDB.","Put the existing DB instance into its own Auto Scaling group.","Modify the existing DB instance to a Multi-AZ configuration."], correct: 0, hint: "Read replicas mengurangi beban database utama untuk laporan." },
        { q: "A cloud architect has a development PostgreSQL database running on Amazon RDS. Testing is complete, and they want to delete the database. Company policy requires storage of development database backups for 6 months after deletion. How can you accomplish this?", options: ["Take a snapshot, and store it for 6 months.","Enable automatic backups, and store it for 6 months.","Enable continuous backups, and store it for 6 months.","Enable Multi-AZ deployments before deleting the database."], correct: 0, hint: "Snapshot manual dapat disimpan setelah instance RDS dihapus." },
        { q: "An application requires a highly available relational database with an initial storage capacity of 8 TB. The database will grow by 8 GB every day. To support expected traffic, at least eight read replicas will be required to handle database reads. Which option will meet these requirements?", options: ["Amazon Aurora Serverless","Amazon DynamoDB","AWS Database Migration Service (AWS DMS)","Amazon Redshift"], correct: 0, hint: "Aurora Serverless menawarkan skalabilitas otomatis dan hingga 15 read replicas." },
        { q: "A company wants to reduce database costs by migrating global account data from a legacy Oracle database to Amazon Aurora. Which services should be used for this migration?", options: ["AWS Database Migration Service (AWS DMS)","AWS Schema Conversion Tool (AWS SCT)","AWS DMS Fleet Advisor","AWS DMS Schema Conversion","AWS Migration Hub"], correct: 0, hint: "DMS memigrasi data, SCT mengonversi skema database." },
        { q: "A complex enterprise application uses a Amazon DynamoDB table. The application queries the database using the 'User_ID' partition key from the 'Applicants' table. New functionality requires querying the 'Applicants' table using the 'resident_Email' field. What must be done to ensure the best performance when using the new functionality?", options: ["Create a global secondary index for the 'Applicants' table using 'resident_Email' as the partition key.","Create a second table that is a duplicate of the first, and set the hash key to 'resident_Email'.","Configure Amazon DynamoDB Accelerator (DAX) to ensure the lowest latency for all queries.","Create a local secondary index for the 'Applicants' table using 'resident_Email' as the partition key."], correct: 0, hint: "GSI memungkinkan query dengan partition key berbeda tanpa mengubah tabel utama." },
        { q: "A start up gaming company is using Amazon DynamoDB for a live read-only stats page. A ProvisionedThroughputExceededException error message continues to appear. What is the MOST cost-effective way to resolve this error?", options: ["Scale up the DynamoDB table by increasing the read capacity units (RCUs).","Scale up the DynamoDB table by increasing the write capacity units (WCUs).","Scale up the DynamoDB table by increasing the read capacity units (RCUs) and write capacity units (WCUs).","Create read replicas to handle the peak traffic capacity."], correct: 0, hint: "Halaman read-only stats hanya perlu meningkatkan RCUs." }
      ],
      'cloud-modul7-10': [
        { q: "An application running on EC2 instances processes sensitive information that's stored on Amazon S3. The information is accessed over the internet. The security team is concerned that the internet connectivity to Amazon S3 is a security risk. Which solution will resolve the security concern?", options: ["Access the data through a virtual private cloud (VPC) endpoint for Amazon S3.","Access the data through an internet gateway.","Access the data through a virtual private network (VPN) connection.","Access the data through a NAT gateway."], correct: 0, hint: "VPC endpoint memungkinkan akses S3 tanpa melalui internet." },
        { q: "An EC2 instance is not receiving a response when it accesses the internet on port 443. A developer narrowed the problem down to a security configuration. The outbound rules for both the security group and the network access control list (network ACL) are configured correctly. What modification should they make?", options: ["Modify the network ACL inbound rule to allow traffic on port 443.","Modify the security group inbound rule to allow traffic on port 443.","Modify both the security group and the network ACL inbound rules to allow traffic on port 443.","Add a second security group to the instance with an inbound rule for port 443."], correct: 0, hint: "Network ACL bersifat stateless, perlu inbound rule untuk traffic balik." },
        { q: "An EC2 instance hosts a publicly accessible application. The security team identified a malicious IP address that needs to be blocked. How should they block the malicious IP address, without disrupting traffic to other users?", options: ["Modify the network access control list (network ACL) inbound rule to deny traffic from the malicious IP address.","Modify the security group inbound rule to deny traffic from the malicious IP address.","Modify the security group outbound rule to deny traffic from the malicious IP address.","Modify the network access control list (network ACL) outbound rule to deny traffic from the malicious IP address."], correct: 0, hint: "Network ACL dapat menolak IP tertentu; security group tidak mendukung aturan deny eksplisit." },
        { q: "A three-tier application has Amazon EC2 instances in a public subnet and a MySQL database in a private subnet. There are intermittent failures, such as time outs, when an EC2 instance sends data to the MySQL database. Which is the most effective way to investigate the issue?", options: ["Check the virtual private cloud (VPC) flow logs of the Amazon RDS MySQL database.","Check the OS logs on the MySQL RDS DB instance.","Check the AWS CloudTrail logs for both Amazon RDS MySQL and the EC2 instances.","Check the Amazon CloudWatch logs for both Amazon RDS MySQL and the EC2 instances."], correct: 0, hint: "VPC Flow logs menangkap informasi lalu lintas jaringan untuk troubleshooting." },
        { q: "A database is hosted in a private subnet. A NAT instance in the public subnet routes traffic from the EC2 instances out to the internet. The operations team is receiving alerts that the NAT instance is exceeding its network activity threshold. What should they do to increase the performance of the architecture?", options: ["Use a NAT gateway instead of a NAT instance in the public subnet.","Move the database to the public subnet with the EC2 instances.","Place the NAT instance closer to the database by placing it in the private subnet.","Modify the private subnet's route table to connect it to the internet gateway."], correct: 0, hint: "NAT Gateway adalah layanan managed dengan skalabilitas lebih baik daripada NAT instance." },
        { q: "An online shopping application will run in a virtual private cloud (VPC) on EC2 instances. The application must read and write data to a customer managed database. There should be no access to the database from the internet, but the database must be able to get software patches from the internet. Which VPC design meets these requirements?", options: ["Use public subnets for the application tier and for the NAT gateway. Then, use a private subnet for the database tier.","Use public subnets for the application tier. Then, use a private subnet for the database tier and for the NAT gateway.","Use public subnets for both the application tier and the database tier.","Use public subnets for the application tier and private subnets for the database tier."], correct: 0, hint: "Database di private subnet, NAT gateway dan aplikasi di public subnet." },
        { q: "An architecture requires a consumer virtual private cloud (VPC) to interact with a service provider VPC. The two VPCs might have overlapping IP address ranges. Which solution should the architect use to connect the VPCs?", options: ["AWS PrivateLink","AWS Site-to-Site VPN","Amazon VPC peering","AWS Direct Connect"], correct: 0, hint: "PrivateLink memungkinkan koneksi antar VPC dengan IP range yang tumpang tindih." },
        { q: "A car dealership has 20 branches all over the United States. Each dealership is represented by a virtual private cloud (VPC) in the architecture. All the VPCs need to be peered together. They need a solution that offers low maintenance and supports growth as more dealerships are added. Which is the best solution to meet these needs?", options: ["AWS Transit Gateway","Amazon VPC peering","AWS Site-to-Site VPN","Virtual private gateway"], correct: 0, hint: "Transit Gateway menyederhanakan koneksi banyak VPC dengan arsitektur hub-and-spoke." },
        { q: "An architect is responsible for configuring a hybrid architecture for a small company with a large customer base. The requirements are that overall costs must be low and the solution must reuse existing internet connections. Which service will best meet the requirements?", options: ["AWS Site-to-Site VPN","AWS Direct Connect","Amazon VPC peering","AWS Transit Gateway"], correct: 0, hint: "Site-to-Site VPN menggunakan koneksi internet yang sudah ada dengan biaya rendah." },
        { q: "An architecture spans across two Regions and has multiple virtual private clouds (VPCs) in each Region. The architect sets up an AWS Transit Gateway hub in each Region to peer the VPCs. They need to connect the Transit Gateway hubs in each Region together so that traffic can flow between Regions. Which solution should they use to connect the Transit Gateway hubs?", options: ["Transit gateway peering attachments","AWS PrivateLink","AWS Site-to-Site VPN","AWS Direct Connect"], correct: 0, hint: "Transit Gateway peering menghubungkan TGW antar Region." },
        { q: "An architecture has three virtual private clouds (VPCs) that must communicate with each other. As the business grows, it is not expected that the architecture will expand beyond the three initial VPCs. Which is the most cost-effective way of connecting the VPCs?", options: ["Amazon VPC peering","AWS Transit Gateway","AWS Direct Connect","AWS Site-to-Site VPN"], correct: 0, hint: "VPC peering lebih murah untuk koneksi point-to-point antar VPC dalam jumlah sedikit." },
        { q: "A financial company needs to establish network connections between its on-premises network and AWS virtual private clouds (VPCs). The connectivity needs to be secure with IPsec connections. A predictable and high-performance network is required over private lines. Which methods should they select?", options: ["AWS Direct Connect","AWS VPN","AWS Transit Gateway","AWS PrivateLink","Amazon VPC peering connection"], correct: 0, hint: "Direct Connect menyediakan koneksi privat; AWS VPN menyediakan IPsec." },
        { q: "A solutions architect is designing an application that needs to manage and control temporary user identities and their corresponding access across AWS Identity and Access Management (IAM) users in multiple AWS accounts. Which AWS service would be the most appropriate to use?", options: ["Amazon Macie","AWS IAM Identity Center","Amazon Cognito"], correct: 1, hint: "IAM Identity Center mengelola akses pengguna di beberapa akun AWS." },
        { q: "A public web application lets users create accounts. The application relies on federating non-AWS user access to websites. Which AWS service can provide this functionality?", options: ["Amazon Cognito","AWS Directory Service","AWS Console Mobile Application","AWS IAM Identity Center"], correct: 0, hint: "Amazon Cognito menyediakan federasi identitas untuk pengguna aplikasi web." },
        { q: "A company needs a way for its users to login to AWS services using their existing corporate identities. Which option should they choose to accomplish this?", options: ["AWS IAM Identity Center","Amazon Cognito","AWS Identity and Access Management (IAM) users","Service control policy"], correct: 0, hint: "IAM Identity Center memungkinkan SSO dengan identitas korporat yang sudah ada." },
        { q: "An application contains sensitive user financial information that will be stored in several AWS services and needs to be encrypted. Which would be the most suitable way to accomplish this?", options: ["AWS Key Management Service (AWS KMS)","Amazon GuardDuty","AWS Security Hub","AWS Secrets Manager"], correct: 0, hint: "AWS KMS mengelola kunci enkripsi untuk berbagai layanan AWS." },
        { q: "A developer is creating a web application that is hosted on an EC2 instance that requires disk level encryption for all data stored. Which AWS service offers this feature?", options: ["Amazon Elastic Block Store (Amazon EBS)","Instance store","AWS Shield","AWS WAF"], correct: 0, hint: "EBS menyediakan enkripsi volume pada tingkat disk." },
        { q: "A company needs to store massive amounts of PDF files in the cloud. There is a requirement that the data is secured using server-side encryption and that the MOST cost effective storage for the files is used. Which combination of services should the company use?", options: ["Amazon S3 to store the data.","Use AWS Key Management Service (AWS KMS) for server-side encryption.","Use Amazon Elastic Block Store (Amazon EBS) to store the data.","Use AWS Security Hub for server-side encryption.","Use AWS Secrets Manager for server-side encryption."], correct: 0, hint: "S3 untuk penyimpanan hemat biaya, KMS untuk enkripsi server-side." },
        { q: "A company recently recovered from a security incident that involved a network exposure on its EC2 instances. They want a solution that can protect against network exposures in the future and offer remediation guidance for any vulnerabilities that might be found. Which AWS service can do this?", options: ["Amazon Inspector","Amazon Detective","AWS Control Tower","Amazon Macie"], correct: 0, hint: "Amazon Inspector memindai kerentanan dan exposure jaringan pada EC2." },
        { q: "A developer has an architecture that consists of multiple AWS accounts. They want to find a way to reduce the overall costs and better manage and control which services and resources can be provisioned in an account. Which AWS service can help do this?", options: ["AWS Organizations","AWS Trusted Advisor","AWS Security Hub","AWS Outposts"], correct: 0, hint: "AWS Organizations mengelola kebijakan dan pengaturan di beberapa akun." },
        { q: "A chief technology officer (CTO) asks their team whether AWS provides a service that can help view and manage security alerts in one place. The CTO wants to understand the overall security posture for the AWS account and automate security checks. Which AWS service would they recommend?", options: ["AWS Security Hub","AWS Audit Manager","Amazon Inspector","Amazon Detective"], correct: 0, hint: "Security Hub mengonsolidasi temuan keamanan dari berbagai layanan AWS." },
        { q: "A long-running application implemented on EC2 instances uses an Amazon EC2 Auto Scaling policy to cost effectively scale the application servers. The application traffic cannot be predicted, so auto scaling should be automated based on previous workload traffic patterns. Which auto scaling policy type would satisfy the requirement?", options: ["Predictive scaling policy","Step scaling policy","Simple scaling policy","Scheduled scaling policy"], correct: 0, hint: "Predictive scaling menggunakan machine learning untuk memprediksi lalu lintas." },
        { q: "A solutions architect is architecting an application that will receive a high volume of traffic. User traffic should be directed to specific AWS Lambda functions based on the application API call route. Which load balancer is appropriate to be part of the design?", options: ["Application Load Balancer","Classic Load Balancer","Gateway Load Balancer","Network Load Balancer"], correct: 0, hint: "ALB dapat merutekan traffic ke Lambda functions berdasarkan path/rules." },
        { q: "Which features does Amazon Route 53 provide?", options: ["Domain management and hosted zone provisioning","Resource health checks","DNS resolution with resolver service","Global content delivery","Securely access services hosted on AWS"], correct: 0, hint: "Route 53 menyediakan manajemen domain dan health checking." },
        { q: "In an application, Amazon S3 sends a message to an Amazon Simple Queue Service (Amazon SQS) queue whenever there is an image upload event. A single EC2 instance reads the message from the queue, then loads the image from S3 and processes it. Image meta data is stored in an on-demand Amazon DynamoDB table. If predicted traffic increases by ten times, which component will need reconfiguration to scale?", options: ["EC2 instance","Amazon DynamoDB table","Lambda function","SQS queue"], correct: 0, hint: "EC2 instance perlu diskalakan (misal dengan Auto Scaling) untuk menangani beban." },
        { q: "A developer created an internal User Datagram Protocol (UDP) application that uses EC2 instances that require ultra-low latency. The EC2 currently handles TLS. The system needs to scale to utilize more EC2 instances. They want to use TLS offloading on the load balancer. Which load balancer would be the most appropriate in this situation?", options: ["Network Load Balancer","Application Load Balancer","Classic Load Balancer","Gateway Load Balancer"], correct: 0, hint: "NLB menangani UDP dan TLS offloading dengan latensi sangat rendah." },
        { q: "An internal facing web application is used intermittently and should be extremely cost efficient. The relational database should require minimal human administration and automatically scale horizontally using configured limits. Over weekends, the database should be stopped. Which Amazon database would satisfy these requirements?", options: ["Amazon Aurora Serverless","Amazon Aurora cluster","Amazon RDS MySQL","Amazon DynamoDB"], correct: 0, hint: "Aurora Serverless otomatis scaling dan dapat di-pause saat tidak digunakan." }
      ],
      'cloud-modul11-13': [
        { q: "A development team intends to create the entire company infrastructure with AWS CloudFormation templates. Each team produces a specific CloudFormation template. How can the team accomplish this task?", options: ["Nested stacks","Conditions","Change sets","Transform"], correct: 0, hint: "Nested stacks memungkinkan penggabungan beberapa template CloudFormation." },
        { q: "A development team is using AWS CloudFormation to launch the infrastructure for an application. Security for the application needs to be upgraded, but the team is concerned that the update might impact the performance of the application. What can be done to preview how these updates will impact the infrastructure?", options: ["Change sets","Mappings","Conditions","Nested stacks"], correct: 0, hint: "Change sets memberikan pratinjau perubahan sebelum diterapkan." },
        { q: "A solutions architect is designing an application using AWS CloudFormation. The application requires code that integrates AWS services that the architect is less familiar with. Which service can offer real-time code suggestions to help the solutions architect to successfully code for these requirements?", options: ["Amazon Q Developer","AWS Lambda","AWS Quick Starts","AWS Amplify"], correct: 0, hint: "Amazon Q Developer memberikan rekomendasi kode real-time." },
        { q: "A company is hosting a WordPress eCommerce site with the records being stored in an Amazon RDS database. After a few days, the Amazon RDS database is experiencing serious performance issues due to the high volume of database read requests. Which is the most cost-effective way to deal with the performance issues?", options: ["Configure Amazon ElastiCache to cache content from the database.","Enable the Multi-AZ feature for the Amazon RDS database.","Place a load balancer in front of the database.","Configure Amazon CloudFront to cache content from the database."], correct: 0, hint: "ElastiCache mengurangi beban database dengan menyimpan data sering diakses di cache." },
        { q: "An S3 bucket regularly receives uploaded videos from a web application. Users in the United States can access the videos with very low latency. Users in Europe and other Regions are complaining of slow downloads. Which solution can maintain a good user experience regardless of which Region users connect from?", options: ["Configure Amazon CloudFront and connect to the S3 bucket as a source.","Enable S3 cross-Region replication for Regions where complaints are coming in.","Configure Amazon API Gateway and connect to the S3 bucket as the source.","Create AWS Lambda functions to deliver the content directly to the users that are experiencing issues."], correct: 0, hint: "CloudFront mendistribusikan konten melalui edge location global untuk latensi rendah." },
        { q: "A developer was just hired by a large organization that uses many different AWS services in their environment. They were instructed to configure a web application using stateless web servers. Which services can they use to handle session state data?", options: ["Amazon DynamoDB","Amazon ElastiCache","Amazon Neptune","Amazon Redshift","Amazon S3 Glacier"], correct: 0, hint: "DynamoDB dan ElastiCache adalah solusi penyimpanan session state yang umum." },
        { q: "A company has an architecture that uses Amazon RDS for the database server tier and Amazon EC2 for the web server and application server tiers. Communication between tiers is synchronous. The application server failed, causing the entire system to go down. How can this be rearchitected to prevent the system from going down?", options: ["Decouple the architecture by adding Application Load Balancers between the tiers.","Decouple the architecture by combining the web and application servers onto the same EC2 instance.","Decouple the architecture by changing to an Amazon DynamoDB database.","Decouple the architecture by adding more EC2 instances to the web and application tiers."], correct: 0, hint: "ALB mendistribusikan lalu lintas dan memberikan redundansi antar tier." },
        { q: "An e-commerce platform currently uses dependent Amazon EC2 instances for operations. During high-traffic periods like sales events, increased load on one service disrupts all the interconnected services, affecting the overall performance. Which Amazon service should be added to solve this problem?", options: ["Amazon Simple Queue Service (Amazon SQS)","Amazon Simple Notification Service (Amazon SNS)","Amazon API Gateway","Amazon EventBridge"], correct: 0, hint: "SQS mendekouple layanan dengan antrian pesan." },
        { q: "A social media platform allows users to update their profile pictures. The process of resizing images is synchronous, which causes considerable strain on the main server. The application currently utilizes Amazon EC2 to process the profile picture, then updates and stores them in Amazon S3. During peak usage times, the service encounters latency issues. How can Amazon Simple Queue Service (Amazon SQS) be used to decouple the existing architecture?", options: ["Directly upload the picture to S3 and have a trigger add a message to Amazon SQS to have EC2 process the picture.","Use Amazon SQS to store the images before they are processed by EC2.","Use Amazon SQS to slow down the image processing speed.","Implement Amazon SQS to replace the main server."], correct: 0, hint: "SQS bertindak sebagai buffer antara upload dan processing." },
        { q: "A delivery company wants to provide real-time updates when packages are dispatched for delivery. Their current process involves manually updating their database and relying on customers to log into their system to check the status of their deliveries. Which service should be used to accomplish real-time notification?", options: ["Use Amazon Simple Notification Service (Amazon SNS).","Use a faster serverless database solution like Amazon Aurora.","Increase the amount of EC2 instances to improve speed.","Use Amazon Simple Queue Service (Amazon SQS)."], correct: 0, hint: "SNS mengirim notifikasi real-time ke pelanggan (email, SMS, dll)." },
        { q: "A company has five consuming applications that need to process a single event. How can they accomplish this?", options: ["Broadcast the event using Amazon Simple Notification Service (Amazon SNS) to five Amazon Simple Queue Service (Amazon SQS) subscribers that the applications can poll.","Create the event using Amazon EventBridge.","Build the event using Amazon MQ and send directly to the applications.","Use synchronous messaging with an elastic load balancer."], correct: 0, hint: "SNS fan-out ke banyak SQS queues memungkinkan banyak aplikasi memproses event." },
        { q: "A global financial institution currently relies on an on-premises message-oriented middleware for its high-volume trade processing systems. They are considering migrating to a cloud-based messaging service. When should the financial institution consider the implementation of Amazon MQ?", options: ["When the institution wants to retain their existing application code and achieve better scalability and operational efficiency","When the institution requires better management of their customer data","When the institution is planning to build a completely new cloud-centered application","When the institution needs to store a large volume of data in the cloud"], correct: 0, hint: "Amazon MQ kompatibel dengan API messaging standar (AMQP, MQTT, STOMP)." }
      ],
      'cloud-modul14-16': [
        { q: "A development team is troubleshooting their AWS Lambda function that connects with an Amazon RDS MySQL database in a customer's virtual private cloud (VPC) to store data. Currently the function times out with 'too many database connections' error. Which architecture option would fix this problem?", options: ["Ensure that the Lambda function is attached to the RDS MySQL VPC. Use the Lambda service to configure an RDS connection using RDS proxy.","Ensure that the Lambda function is connected to the Lambda service VPC-to-VPC NAT gateway which connects to the customer's VPC elastic network interface.","Launch an RDS proxy service on an EC2 instance in the customer's VPC. Connect the Lambda function to the RDS proxy service.","Launch an Amazon EC2 bastion host instance and connect the Lambda function to the bastion host. Ensure the bastion host has access to the RDS database."], correct: 0, hint: "RDS Proxy mengelola koneksi database untuk Lambda agar tidak kehabisan koneksi." },
        { q: "Which are examples of microservice serverless patterns on AWS?", options: ["Amazon Kinesis invokes an AWS Lambda function and stores data on Amazon DynamoDB.","Amazon API Gateway invokes an application running on AWS Fargate containers through an Application Load Balancer.","Application Load Balancer invokes an application running on Amazon EC2 instances to store data on an Amazon DynamoDB table.","Application Load Balancer invokes an application running on Amazon Elastic Container Service (Amazon ECS) which stores data on an Amazon Aurora Serverless cluster.","Application Load Balancer invokes an application running on Amazon Elastic Kubernetes Service (Amazon EKS) which stores data on an Amazon DynamoDB table."], correct: 0, hint: "Pola serverless microservice menggunakan Lambda + Kinesis + DynamoDB." },
        { q: "A solutions architect is tasked to build a production scale application using containers as the compute solution. They decide to use Amazon Elastic Container Service (Amazon ECS). After setting up their Amazon ECS cluster, which steps should they follow to build a production environment?", options: ["Create and run a task definition to deploy containers on Amazon EC2 instance nodes. Set up an Application Load Balancer to route traffic to the containers.","Create a service definition. Run the service to deploy containers on Amazon EC2 instance nodes.","Create a PodSpec and then deploy containers on Amazon EC2 instance nodes. Specify a Kubernetes service to route traffic to the containers.","Create a PodSpec and use it to launch one container on Amazon EC2 instance nodes. Add an Application Load Balancer to route traffic to the container."], correct: 0, hint: "Task definition + service + ALB adalah langkah standar deployment ECS." },
        { q: "A stock brokerage company wants to provide a secure, scalable API solution for their AWS resources. Customers can sign up for the free service, which limits API requests per day, or the paid service for unlimited API usage. Which API type would satisfy these requirements?", options: ["Amazon API Gateway REST API","Amazon API Gateway HTTP API","Amazon API Gateway WebSocket APIs","AWS AppSync GraphQL APIs"], correct: 0, hint: "REST API di API Gateway mendukung usage plans dan throttling." },
        { q: "A system designer wants to utilize AWS Lambda functions for a global e-commerce website. Which environments are valid Lambda runtime environments?", options: ["Lambda service virtual private cloud (VPC)","Amazon CloudFront regional edge cache","AWS customer virtual private cloud (VPC)","Amazon CloudFront edge cache","Amazon Elastic Container Service (Amazon ECS) cluster"], correct: 2, hint: "Lambda dapat berjalan di VPC kustomer dan di CloudFront edge cache (Lambda@Edge)." },
        { q: "A system designer working for a bank has to choose an AWS workflow orchestration service. They choose the AWS Step Functions service. Which statements are true about AWS Step Functions workflow types?", options: ["Express Workflows offer synchronous and asynchronous workflows.","Standard Workflows offer an exactly-once run model for workflows.","Standard Workflows offer synchronous and asynchronous processing.","Standard Workflows are charged based on the number of requests for the workflow and its duration.","Express Workflows are charged based on the number of state transitions."], correct: 0, hint: "Express Workflows mendukung sinkronus dan asinkronus; Standard Workflows exactly-once." },

    // ─── START ───────────────────────────────────────────────────
    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuizPlay(examId) {
      currentQuizId      = examId;
      quizQuestions      = shuffleArray(ALL_EXAMS_QUESTIONS[examId] || ALL_EXAMS_QUESTIONS['mtk-matriks']);

      quizPhase          = 'intro';
      userAnswers        = {};
      markedDoubt        = {};
      hintShownForQuestion            = {};
      eliminatedOptionsForQuestion    = {};
      secondChanceForQuestion         = {};
      scannerForQuestion              = {};

          if (userAnswers[idx] === q.correct) { correctCount++; earnedXp += 10; return; }
          if (luckyGuessForQuestion[idx] && userAnswers[idx] !== undefined && Math.random() < 0.5) { correctCount++; earnedXp += 10; }

        const wrongCount = quizQuestions.length - correctCount;
        const accuracy = Math.round((correctCount / quizQuestions.length) * 100);
        earnedXp += mysteryBonusXp;

        // Update global state
        appState.xp            += earnedXp;
        appState.examsCompleted += 1;
        appState.correctAnswers += correctCount;

        const labelLetters = ['A', 'B', 'C', 'D', 'E'];

        container.innerHTML = `

                </div>
                <div class="bg-xp-gold/10 border border-xp-gold/30 rounded-2xl p-3">
                  <p class="text-2xl font-extrabold italic tabular-nums text-xp-gold">+${earnedXp}</p>
                  <p class="text-[10px] font-bold text-xp-gold/70 uppercase tracking-wider">XP</p>
                </div>
              </div>

              <!-- Actions -->
              <div class="flex gap-2 mt-4">
                <a href="quiz-play.html?exam=${currentQuizId}" class="flex-1 bg-primary text-primary-foreground font-extrabold text-sm py-3 rounded-2xl shadow-glow text-center active:scale-95 transition-all">
                  Main Lagi
                </a>
                <a href="quiz.html" class="flex-1 bg-card border border-border text-foreground font-bold text-sm py-3 rounded-2xl text-center active:scale-95 transition-all">
                  Beranda
                </a>
              </div>
            </div>

            <!-- Review All Questions -->
            <div class="flex-1 px-4 py-5 space-y-4 overflow-y-auto">
              <p class="text-xs font-extrabold text-muted-foreground uppercase tracking-widest">Pembahasan Soal</p>
              ${quizQuestions.map((q, idx) => {
                const userAns = userAnswers[idx];
                const isCorrect = userAns === q.correct;
                return `
                  <div class="bg-card border border-border rounded-2xl p-4 space-y-3 ${!isCorrect && userAns !== undefined ? 'border-danger/30' : ''}">
                    <div class="flex items-start gap-2">
                      <span class="w-6 h-6 rounded-lg bg-muted grid place-items-center text-[10px] font-extrabold text-muted-foreground shrink-0 mt-0.5">${idx + 1}</span>
                      <p class="text-sm font-bold leading-snug">${q.q}</p>
                    </div>
                    <div class="space-y-1.5">
                      ${q.options.map((opt, oi) => {
                        const isUserAnswer = userAns === oi;
                        const isCorrectAnswer = q.correct === oi;
                        let optClass = 'bg-background border-border text-foreground';
                        if (isCorrectAnswer) optClass = 'bg-emerald-50 dark:bg-emerald-950/30 border-emerald-400 text-emerald-800 dark:text-emerald-300';
                        else if (isUserAnswer && !isCorrect) optClass = 'bg-danger/10 border-danger/50 text-danger';
                        return `
                          <div class="flex items-center gap-2 px-3 py-2 rounded-xl border text-xs font-medium ${optClass}">
                            <span class="w-5 h-5 rounded-md bg-muted grid place-items-center text-[10px] font-bold shrink-0">${labelLetters[oi]}</span>
                            <span>${opt}</span>
                            ${isCorrectAnswer ? '<i data-lucide="check" class="w-3.5 h-3.5 text-emerald-500 shrink-0 ml-auto"></i>' : ''}
                            ${isUserAnswer && !isCorrect ? '<i data-lucide="x" class="w-3.5 h-3.5 text-danger shrink-0 ml-auto"></i>' : ''}
                          </div>`;
                      }).join('')}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      lucide.createIcons();
    }

    // ─── POWERUP RAFFLE ──────────────────────────────────────────
    function startPowerupRaffle() {
      quizPhase = 'rolling';
      renderQuizPlayContent();

      const powerups = POWERUPS_DEFINITIONS.map(p => p.id);
      const raffleInterval = setInterval(() => {
        rollItems = [
          powerups[Math.floor(Math.random() * powerups.length)],
          powerups[Math.floor(Math.random() * powerups.length)],
          powerups[Math.floor(Math.random() * powerups.length)]
        ];
        renderQuizPlayContent();
      }, 80);

      setTimeout(() => {
        clearInterval(raffleInterval);
        const shuffled   = [...powerups].sort(() => Math.random() - 0.5);
        unlockedPowerups = shuffled.slice(0, 3);
        rollItems        = [...unlockedPowerups];
        renderQuizPlayContent();

        setTimeout(() => {
          quizPhase = 'playing';
          renderQuizPlayContent();
        }, 1400);
      }, 2200);
    }

    // ─── ACTIONS ─────────────────────────────────────────────────
    function selectQuizOption(idx)    { userAnswers[currentQuestionIdx] = idx; renderQuizPlayContent(); }
    function toggleQuizQuestionDoubt(){ markedDoubt[currentQuestionIdx] = !markedDoubt[currentQuestionIdx]; renderQuizPlayContent(); }
    function prevQuizQuestion()       { if (currentQuestionIdx > 0)                          { currentQuestionIdx--; renderQuizPlayContent(); } }
    function nextQuizQuestion()       { if (currentQuestionIdx < quizQuestions.length - 1)   { currentQuestionIdx++; renderQuizPlayContent(); } }
    function openQuizReviewOverlay() {
      const answeredCount = Object.keys(userAnswers).length;
      const gridBtnsHtml = quizQuestions.map((_, idx) => {
        const hasAns  = userAnswers[idx] !== undefined;
        const isDoubt = markedDoubt[idx];
        let btnClass  = isDoubt ? "bg-warning/20 border-warning text-warning"
                      : hasAns  ? "bg-primary text-primary-foreground border-primary"
                      :           "bg-card border-border text-muted-foreground";
        return `
          <button onclick="jumpToQuizQuestion(${idx})"
            class="aspect-square rounded-xl font-extrabold text-sm border-2 transition-all grid place-items-center ${btnClass}">
            ${idx + 1}
          </button>`;
      }).join('');

      document.getElementById('review-modal-body').innerHTML = `
        <div class="grid grid-cols-5 gap-2">${gridBtnsHtml}</div>
        <div class="space-y-2 text-xs text-muted-foreground">
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-primary"></div><span>Dijawab</span></div>
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-warning"></div><span>Ragu-ragu</span></div>
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-card border border-border"></div><span>Belum dijawab</span></div>
        </div>
        <p class="text-center text-sm text-muted-foreground">
          Sudah menjawab <span class="font-extrabold text-foreground">${answeredCount}/${quizQuestions.length}</span> soal
        </p>
        <button onclick="submitQuizFinished()"
          class="w-full py-4 rounded-2xl bg-primary text-primary-foreground font-extrabold text-sm shadow-glow active:scale-95 hover:scale-[1.01] transition-all">
          Submit
        </button>
      `;

      const overlay = document.getElementById('review-overlay');
      const modal   = document.getElementById('review-modal');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          modal.style.transform = 'translateX(-50%) translateY(0)';
        });
      });
      if (window.lucide) lucide.createIcons();
    }

    function closeReviewModal() {
      const overlay = document.getElementById('review-overlay');
      const modal   = document.getElementById('review-modal');
      modal.style.transform = 'translateX(-50%) translateY(100%)';
      setTimeout(() => overlay.classList.add('hidden'), 400);
    }

    function resumeQuizPlay()       { closeReviewModal(); }
    function jumpToQuizQuestion(idx){ currentQuestionIdx = idx; closeReviewModal(); }

    function showConfirmModal({ title, message, confirmText, onConfirm }) {
      document.getElementById('confirm-modal-body').innerHTML = `
        <div class="text-center">
          <div class="w-14 h-14 rounded-2xl bg-danger/10 grid place-items-center mx-auto">
            <i data-lucide="alert-triangle" class="w-7 h-7 text-danger" stroke-width="2.2"></i>
          </div>
          <h3 class="font-extrabold text-lg mt-3">${title}</h3>
          <p class="text-sm text-muted-foreground mt-1">${message}</p>
        </div>
        <div class="flex gap-3">
          <button onclick="closeConfirmModal()"
            class="flex-1 h-12 rounded-2xl bg-card border border-border font-bold text-sm hover:bg-muted transition-all active:scale-95">
            Batal
          </button>
          <button id="confirm-action-btn"
            class="flex-1 h-12 rounded-2xl bg-danger text-white font-extrabold text-sm shadow-lg active:scale-95 transition-all">
            ${confirmText}
          </button>
        </div>
      `;

      const overlay = document.getElementById('confirm-overlay');
      const modal   = document.getElementById('confirm-modal');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          modal.style.transform = 'translateX(-50%) translateY(0)';
        });
      });

      document.getElementById('confirm-action-btn').onclick = () => {
        closeConfirmModal();
        onConfirm();
      };
      if (window.lucide) lucide.createIcons();
    }

    function closeConfirmModal() {
      const overlay = document.getElementById('confirm-overlay');
      const modal   = document.getElementById('confirm-modal');
      modal.style.transform = 'translateX(-50%) translateY(100%)';
      setTimeout(() => overlay.classList.add('hidden'), 400);
    }

    function submitQuizFinished() {
      closeReviewModal();
      showConfirmModal({
        title: 'Kumpulkan Jawaban?',
        message: 'Pastikan semua jawaban sudah diisi. Soal yang belum dijawab akan dianggap kosong.',
        confirmText: 'Ya, Kumpulkan',
        onConfirm: () => {
          quizPhase = 'finished';
          renderQuizPlayContent();
        }
      });
    }

    function confirmExitQuiz() {
      showConfirmModal({
        title: 'Keluar dari Ujian?',
        message: 'Semua progres jawaban akan hilang dan tidak bisa dikembalikan.',
        confirmText: 'Keluar',
        onConfirm: () => {
          window.location.href = 'quiz.html';
        }
      });
    }

    function useActiveQuizPowerup(powerupId) {
      if (usedPowerups.includes(powerupId)) return;
      const q = quizQuestions[currentQuestionIdx];
      if (powerupId === 'hint') {
        hintShownForQuestion[currentQuestionIdx] = true;
      } else if (powerupId === 'fifty') {
        const wrongOpts = q.options
          .map((_, i) => i).filter(i => i !== q.correct)
          .sort(() => Math.random() - 0.5).slice(0, 2);
        eliminatedOptionsForQuestion[currentQuestionIdx] = wrongOpts;
      } else if (powerupId === 'shield') {
        userAnswers[currentQuestionIdx] = q.correct;
      } else if (powerupId === 'second-chance') {
        secondChanceForQuestion[currentQuestionIdx] = true;
        if (userAnswers[currentQuestionIdx] !== undefined && userAnswers[currentQuestionIdx] !== q.correct) {
          delete userAnswers[currentQuestionIdx];
        }
      } else if (powerupId === 'scanner') {
        scannerForQuestion[currentQuestionIdx] = true;
      } else if (powerupId === 'skip') {
        skippedQuestions[currentQuestionIdx] = true;
        userAnswers[currentQuestionIdx] = q.correct;
        if (currentQuestionIdx < quizQuestions.length - 1) {
          currentQuestionIdx++;
        }
      } else if (powerupId === 'lucky') {
        luckyGuessForQuestion[currentQuestionIdx] = true;
      } else if (powerupId === 'mystery') {
        const q = quizQuestions[currentQuestionIdx];
        const effects = ['fifty', 'hint', 'bonus', 'skip'];
        const chosen = effects[Math.floor(Math.random() * effects.length)];
        if (chosen === 'fifty') {
          const wrongIndices = q.options.map((_, i) => i).filter(i => i !== q.correct);
          const shuffledWrong = wrongIndices.sort(() => Math.random() - 0.5).slice(0, 2);
          eliminatedOptionsForQuestion[currentQuestionIdx] = new Set(shuffledWrong);
        } else if (chosen === 'hint') {
          hintShownForQuestion[currentQuestionIdx] = true;
        } else if (chosen === 'bonus') {
          mysteryBonusXp += 15;
        } else if (chosen === 'skip') {
          skippedQuestions[currentQuestionIdx] = true;
          userAnswers[currentQuestionIdx] = q.correct;
          if (currentQuestionIdx < quizQuestions.length - 1) {
            currentQuestionIdx++;
          }
        }
      }
      usedPowerups.push(powerupId);
      renderQuizPlayContent();
    }
  </script>
</body>
