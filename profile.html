<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduQuest — Profil</title>
  <meta name="description" content="Profil akademik kamu di EduQuest. Lihat statistik, analisis kekuatan, dan atur tampilan.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            background: 'rgba(var(--background), <alpha-value>)',
            foreground: 'rgba(var(--foreground), <alpha-value>)',
            card: { DEFAULT: 'rgba(var(--card), <alpha-value>)', foreground: 'rgba(var(--card-foreground), <alpha-value>)' },
            primary: { DEFAULT: 'rgba(var(--primary), <alpha-value>)', foreground: 'rgba(var(--primary-foreground), <alpha-value>)', glow: 'rgba(var(--primary-glow), <alpha-value>)' },
            muted: { DEFAULT: 'rgba(var(--muted), <alpha-value>)', foreground: 'rgba(var(--muted-foreground), <alpha-value>)' },
            border: 'rgba(var(--border), <alpha-value>)',
            'brand-soft': 'rgba(var(--brand-soft), <alpha-value>)',
            success: 'rgba(var(--success), <alpha-value>)',
            warning: 'rgba(var(--warning), <alpha-value>)',
            danger: 'rgba(var(--danger), <alpha-value>)',
            'xp-gold': 'rgba(var(--xp-gold), <alpha-value>)',
          },
          boxShadow: { glow: '0 10px 40px -10px rgba(178, 59, 231, 0.5)' },
          animation: { 'fade-in': 'fade-in 0.4s ease-out', 'pulse-glow': 'pulse-glow 2s ease-in-out infinite' }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f2f1f5] dark:bg-[#121016] min-h-screen flex justify-center items-start">

  <div class="min-h-screen w-full max-w-md bg-background relative pb-24 shadow-2xl flex flex-col overflow-x-hidden border-x border-border/40">

    <!-- TopBar -->
    <div id="topbar-placeholder"></div>

    <!-- Profile View -->
    <section class="px-4 pt-6 space-y-6 animate-fade-in flex flex-col">

      <!-- Identity Card -->
      <div class="bg-gradient-to-br from-primary to-primary-glow rounded-3xl p-6 text-primary-foreground shadow-glow text-center relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(255,255,255,0.2),transparent_60%)]"></div>
        <div class="relative">
          <img src="assets/companion.png" alt="Profile Avatar"
               class="w-24 h-24 rounded-full bg-white/20 mx-auto outline outline-4 outline-white/30 object-cover" />
          <h2 class="text-2xl font-extrabold italic mt-3">EduQuest</h2>
          <p class="text-primary-foreground/80 text-sm">XI RPL 1 · SMKN 13 Bandung</p>
          <div class="flex justify-center gap-2 mt-3 flex-wrap">
            <span id="profile-level-badge" class="px-2.5 py-1 bg-white/20 backdrop-blur-sm rounded-full text-[10px] font-extrabold border border-white/30">Lv. 25 Master</span>
            <span class="px-2.5 py-1 bg-white/20 backdrop-blur-sm rounded-full text-[10px] font-extrabold border border-white/30">#4 Nasional</span>
          </div>
        </div>
      </div>

      <!-- Quick Stats Grid -->
      <div class="grid grid-cols-3 gap-3">
        <div class="bg-card border border-border rounded-2xl p-4 text-center shadow-sm">
          <p id="profile-xp-val" class="text-xl font-extrabold italic tabular-nums">3,950</p>
          <p class="text-[10px] font-bold text-muted-foreground uppercase tracking-wider mt-0.5">Total XP</p>
        </div>
        <div class="bg-card border border-border rounded-2xl p-4 text-center shadow-sm">
          <p id="profile-exams-val" class="text-xl font-extrabold italic tabular-nums">42</p>
          <p class="text-[10px] font-bold text-muted-foreground uppercase tracking-wider mt-0.5">Ujian</p>
        </div>
        <div class="bg-card border border-border rounded-2xl p-4 text-center shadow-sm">
          <p id="profile-accuracy-val" class="text-xl font-extrabold italic tabular-nums">78%</p>
          <p class="text-[10px] font-bold text-muted-foreground uppercase tracking-wider mt-0.5">Akurasi</p>
        </div>
      </div>





      <!-- Settings -->
      <div class="space-y-2">

        <!-- Dark Mode Toggle -->
        <button onclick="toggleDarkMode()" id="darkmode-btn"
          class="w-full bg-card border border-border rounded-2xl p-4 flex items-center gap-3 hover:border-primary/30 transition-colors">
          <span id="darkmode-icon-container">
            <i data-lucide="moon" class="w-5 h-5 text-primary"></i>
          </span>
          <span id="darkmode-label" class="font-bold text-sm flex-1 text-left">Mode Gelap</span>
          <div class="relative w-10 h-6 rounded-full bg-muted transition-colors" id="darkmode-toggle-track">
            <div class="absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-card shadow transition-all duration-300" id="darkmode-toggle-thumb"></div>
          </div>
        </button>

        <!-- Account Settings (placeholder) -->
        <button class="w-full bg-card border border-border rounded-2xl p-4 flex items-center gap-3 hover:border-primary/30 transition-colors">
          <i data-lucide="settings" class="w-5 h-5 text-muted-foreground"></i>
          <span class="font-bold text-sm flex-1 text-left">Pengaturan Akun</span>
          <i data-lucide="chevron-right" class="w-4 h-4 text-muted-foreground"></i>
        </button>



      </div>

    </section>

    <!-- BottomNav -->
    <div id="bottomnav-placeholder"></div>
  </div>

  <!-- Shared JS -->
  <script src="js/shared.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      bootPage('profile');
      syncProfileStats();
    });

    function syncProfileStats() {
      // XP, Exams, Accuracy
      const xpEl  = document.getElementById('profile-xp-val');
      const exEl  = document.getElementById('profile-exams-val');
      const acEl  = document.getElementById('profile-accuracy-val');
      if (xpEl) xpEl.textContent = appState.xp.toLocaleString();
      if (exEl) exEl.textContent = appState.examsCompleted;
      if (acEl) {
        const acc = appState.correctAnswers > 0
          ? Math.round((appState.correctAnswers / (appState.examsCompleted * 5)) * 100)
          : 78;
        acEl.textContent = `${acc}%`;
      }

      // Level badge
      const lvlInfo  = getLevelInfo(appState.xp);
      const lvlBadge = document.getElementById('profile-level-badge');
      if (lvlBadge) lvlBadge.textContent = `Lv. ${lvlInfo.level} Master`;

      // Topbar
      const tbXP     = document.getElementById('topbar-xp');
      if (tbXP)     tbXP.textContent     = `${appState.xp.toLocaleString()} XP`;
    }


  </script>
</body>
</html>
