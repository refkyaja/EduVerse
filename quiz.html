<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduQuest — Pilih Ujian</title>
  <meta name="description" content="Pilih ujian yang ingin kamu kerjakan di EduQuest. Kerjakan soal, raih XP, dan tantang boss.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            background: 'rgba(var(--background), <alpha-value>)',
            foreground: 'rgba(var(--foreground), <alpha-value>)',
            card: { DEFAULT: 'rgba(var(--card), <alpha-value>)', foreground: 'rgba(var(--card-foreground), <alpha-value>)' },
            primary: { DEFAULT: 'rgba(var(--primary), <alpha-value>)', foreground: 'rgba(var(--primary-foreground), <alpha-value>)', glow: 'rgba(var(--primary-glow), <alpha-value>)' },
            muted: { DEFAULT: 'rgba(var(--muted), <alpha-value>)', foreground: 'rgba(var(--muted-foreground), <alpha-value>)' },
            border: 'rgba(var(--border), <alpha-value>)',
            'dark-surface': 'rgba(var(--dark-surface), <alpha-value>)',
            'brand-soft': 'rgba(var(--brand-soft), <alpha-value>)',
            'xp-gold': 'rgba(var(--xp-gold), <alpha-value>)',
          },
          boxShadow: { glow: '0 10px 40px -10px rgba(178, 59, 231, 0.5)' },
          animation: { 'fade-in': 'fade-in 0.4s ease-out', 'pulse-glow': 'pulse-glow 2s ease-in-out infinite' }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f2f1f5] dark:bg-[#121016] min-h-screen flex justify-center items-start">

  <div class="min-h-screen w-full max-w-md bg-background relative pb-24 shadow-2xl flex flex-col overflow-x-hidden border-x border-border/40">

    <!-- TopBar -->
    <div id="topbar-placeholder"></div>

    <!-- Quiz Picker View -->
    <section class="px-4 pt-6 space-y-6 animate-fade-in flex flex-col">
      <div>
        <h1 class="text-2xl font-extrabold italic">Pilih Ujian</h1>
        <p class="text-sm text-muted-foreground mt-1">Kerjakan ulangan untuk dapatkan XP, naik level, dan tantang boss.</p>
      </div>

      <!-- Exam Cards -->
      <div class="space-y-5">

        <!-- SENIN -->
        <div class="space-y-2">

            <span class="text-xs font-extrabold uppercase tracking-widest text-primary">Senin</span>
            <div class="flex-1 h-px bg-border"></div>
          </div>
          <!-- Bahasa Inggris -->
          <button onclick="openChapterModal('inggris')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-teal-400 to-emerald-600 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">ING</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">Bahasa Inggris</h4>

            </div>
          </button>
          <!-- Matematika Diskrit -->

            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-fuchsia-500 to-purple-700 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">DISK</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">Matematika Diskrit</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
        </div>

        <!-- SELASA -->
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary"></div>
            <span class="text-xs font-extrabold uppercase tracking-widest text-primary">Selasa</span>
            <div class="flex-1 h-px bg-border"></div>
          </div>
          <!-- PABP -->
          <button onclick="openChapterModal('pabp')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-600 to-green-700 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">PABP</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">PABP</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
          <!-- Bahasa Indonesia -->
          <button onclick="openChapterModal('ind')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-orange-500 to-pink-600 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">IND</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">Bahasa Indonesia</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
        </div>

        <!-- RABU -->
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary"></div>
            <span class="text-xs font-extrabold uppercase tracking-widest text-primary">Rabu</span>
            <div class="flex-1 h-px bg-border"></div>
          </div>
          <!-- Pwp -->
          <button onclick="openChapterModal('pwp')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-rose-500 to-red-600 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">PWP</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">PWP</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
          <!-- Ppan -->
          <button onclick="openChapterModal('ppan')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500 to-yellow-600 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">PPAN</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">Pendidikan Pancasila</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
        </div>

        <!-- KAMIS -->
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary"></div>
            <span class="text-xs font-extrabold uppercase tracking-widest text-primary">Kamis</span>
            <div class="flex-1 h-px bg-border"></div>
          </div>
          <!-- Matematika -->
          <button onclick="openChapterModal('mtk')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">MTK</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">Matematika</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
          <!-- Pbt -->
          <button onclick="openChapterModal('pbt')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">PBT</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">PBT</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
        </div>

        <!-- JUMAT -->
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary"></div>
            <span class="text-xs font-extrabold uppercase tracking-widest text-primary">Jumat</span>
            <div class="flex-1 h-px bg-border"></div>
          </div>
          <!-- Cloud -->
          <button onclick="openChapterModal('cloud')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">CLOUD</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">Cloud Computing</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
          <!-- Sejarah -->
          <button onclick="openChapterModal('sejarah')" class="w-full text-left bg-card border border-border rounded-2xl p-4 shadow-sm hover:shadow-md hover:border-primary/30 transition-all active:scale-[0.98] cursor-pointer">
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-stone-500 to-amber-700 grid place-items-center text-white font-extrabold text-xs shadow-md shrink-0">SJH</div>
              <div class="flex-1 min-w-0">
                <h4 class="font-extrabold text-base leading-tight">Sejarah Indonesia</h4>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-muted-foreground shrink-0 self-center"></i>
            </div>
          </button>
        </div>
    </section>

    <!-- BottomNav -->
    <div id="bottomnav-placeholder"></div>
  </div>

  <!-- Chapter Modal -->
  <div id="chapter-overlay" onclick="closeChapterModal()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden"></div>
  <div id="chapter-modal" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-card rounded-t-3xl z-50 translate-y-full transition-transform duration-500 ease-out shadow-2xl">
    <div class="flex justify-center pt-4 pb-2">
      <div class="w-10 h-1 rounded-full bg-border"></div>
    </div>
    <div class="px-5 pb-3 flex items-center justify-between border-b border-border">
      <div>
        <h3 id="chapter-modal-title" class="font-extrabold text-lg">Pilih Bab</h3>
        <p id="chapter-modal-sub" class="text-xs text-muted-foreground mt-0.5">Pilih bab yang ingin dikerjakan</p>
      </div>
      <button onclick="closeChapterModal()" class="w-9 h-9 rounded-xl bg-muted flex items-center justify-center hover:bg-muted/80 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div id="chapter-list" class="px-5 py-4 space-y-2 overflow-y-auto max-h-[70vh] pb-10">
    </div>
  </div>

  <!-- Shared JS -->
  <script src="js/shared.js"></script>
  <script>
    const subjects = {
      pabp: { name: 'PABP', fullName: 'Pendidikan Agama & Budi Pekerti', chapters: [
        { id: 'pabp-bab6',  label: 'Bab 6',  title: 'Mari Belajar',       soal: 10 },
        { id: 'pabp-bab7',  label: 'Bab 7',  title: 'Mari Berlatih',     soal: 10 },
        { id: 'pabp-bab8',  label: 'Bab 8',  title: 'Mari Mengkaji',     soal: 10 },
        { id: 'pabp-bab9',  label: 'Bab 9',  title: 'Mari Memahami',     soal: 10 },
        { id: 'pabp-bab10', label: 'Bab 10', title: 'Mari Mengamalkan',  soal: 10 },
      ]},
      ind: { name: 'Bahasa Indonesia', fullName: 'Bahasa Indonesia', chapters: [
        { id: 'ind-multimodal',       label: 'Teks Multimodal',          title: 'Teks Multimodal',          soal: 10 },
        { id: 'ind-karya-ilmiah',     label: 'Karya Ilmiah',             title: 'Karya Ilmiah',             soal: 10 },
        { id: 'ind-proposal',         label: 'Proposal',                 title: 'Proposal',                 soal: 10 },
        { id: 'ind-puisi',            label: 'Puisi',                    title: 'Puisi',                    soal: 10 },
        { id: 'ind-drama-berita-iklan', label: 'Drama, Berita & Iklan',  title: 'Drama, Berita & Iklan',    soal: 10 },
      ]},
      pwp: { name: 'Pwp', fullName: 'Pendidikan Wirausaha & Prakarya', chapters: [
        { id: 'pwp-bab1', label: 'Bab 1', title: 'Kewirausahaan',       soal: 5 },
        { id: 'pwp-bab2', label: 'Bab 2', title: 'Produk Kreatif',       soal: 5 },
        { id: 'pwp-bab3', label: 'Bab 3', title: 'Strategi Pemasaran',   soal: 5 },
        { id: 'pwp-bab4', label: 'Bab 4', title: 'Laporan Keuangan',     soal: 5 },
        { id: 'pwp-bab5', label: 'Bab 5', title: 'Inovasi Produk',       soal: 5 },
      ]},
      ppan: { name: 'Ppan', fullName: 'Pendidikan Pancasila', chapters: [
        { id: 'ppan-bab3', label: 'Bab 3', title: 'Harmoni dalam Keberagaman dan Resolusi Konflik',   soal: 25 },
        { id: 'ppan-bab4', label: 'Bab 4', title: 'Integrasi Nasional, Bentuk Negara, dan Sistem Pemerintahan', soal: 25 },
      ]},
      mtk: { name: 'Matematika', fullName: 'Matematika', chapters: [
        { id: 'mtk-bab1', label: 'Bab 1', title: 'Matriks',                    soal: 5 },
        { id: 'mtk-bab2', label: 'Bab 2', title: 'Determinan',                  soal: 5 },
        { id: 'mtk-bab3', label: 'Bab 3', title: 'Invers Matriks',              soal: 5 },
        { id: 'mtk-bab4', label: 'Bab 4', title: 'Sistem Persamaan Linear',     soal: 5 },
        { id: 'mtk-bab5', label: 'Bab 5', title: 'Vektor',                      soal: 5 },
      ]},
      pbt: { name: 'Pbt', fullName: 'Pendidikan Bimbingan & TIK', chapters: [
        { id: 'pbt-bab1', label: 'Bab 1', title: 'Pengenalan TIK',          soal: 5 },
        { id: 'pbt-bab2', label: 'Bab 2', title: 'Internet & Jaringan',     soal: 5 },
        { id: 'pbt-bab3', label: 'Bab 3', title: 'Keamanan Digital',        soal: 5 },
        { id: 'pbt-bab4', label: 'Bab 4', title: 'Bimbingan Akademik',      soal: 5 },
        { id: 'pbt-bab5', label: 'Bab 5', title: 'Karier & Masa Depan',     soal: 5 },
      ]},
      cloud: { name: 'Cloud', fullName: 'Cloud Computing', chapters: [
        { id: 'cloud-bab1', label: 'Bab 1', title: 'Fundamental Cloud',    soal: 5 },
        { id: 'cloud-bab2', label: 'Bab 2', title: 'Virtualisasi',         soal: 5 },
        { id: 'cloud-bab3', label: 'Bab 3', title: 'Layanan Cloud',        soal: 5 },
        { id: 'cloud-bab4', label: 'Bab 4', title: 'Storage & Database',   soal: 5 },
        { id: 'cloud-bab5', label: 'Bab 5', title: 'Security di Cloud',    soal: 5 },
      ]},
      sejarah: { name: 'Sejarah', fullName: 'Sejarah Indonesia', chapters: [
        { id: 'sjh-bab1', label: 'Bab 1', title: 'Masa Praaksara',          soal: 5 },
        { id: 'sjh-bab2', label: 'Bab 2', title: 'Kerajaan Hindu-Buddha',   soal: 5 },
        { id: 'sjh-bab3', label: 'Bab 3', title: 'Kerajaan Islam',          soal: 5 },
        { id: 'sjh-bab4', label: 'Bab 4', title: 'Kolonialisme',            soal: 5 },
        { id: 'sjh-bab5', label: 'Bab 5', title: 'Pergerakan Nasional',     soal: 5 },
      ]},
      inggris: { name: 'Bahasa Inggris', fullName: 'Bahasa Inggris', chapters: [
        { id: 'ing-bab1', label: 'Bab 1', title: 'Reading Comprehension',    soal: 5 },
        { id: 'ing-bab2', label: 'Bab 2', title: 'Grammar & Tenses',         soal: 5 },
        { id: 'ing-bab3', label: 'Bab 3', title: 'Writing Skills',           soal: 5 },
        { id: 'ing-bab4', label: 'Bab 4', title: 'Listening & Speaking',     soal: 5 },
        { id: 'ing-bab5', label: 'Bab 5', title: 'Vocabulary Builder',       soal: 5 },
      ]},
      'mtk-diskrit': { name: 'Matematika Diskrit', fullName: 'Matematika Diskrit', chapters: [
        { id: 'disk-bab1', label: 'Bab 1', title: 'Logika Matematika',   soal: 5 },
        { id: 'disk-bab2', label: 'Bab 2', title: 'Himpunan',            soal: 5 },
        { id: 'disk-bab3', label: 'Bab 3', title: 'Relasi & Fungsi',     soal: 5 },
        { id: 'disk-bab4', label: 'Bab 4', title: 'Kombinatorika',       soal: 5 },
        { id: 'disk-bab5', label: 'Bab 5', title: 'Graf & Pohon',        soal: 5 },
      ]},
    };

    function openChapterModal(subjectId) {
      const sub = subjects[subjectId];
      if (!sub) return;

      document.getElementById('chapter-modal-title').textContent = sub.name;
      document.getElementById('chapter-modal-sub').textContent = sub.fullName;

      const list = document.getElementById('chapter-list');
      list.innerHTML = sub.chapters.map((ch, i) => `
        <a href="quiz-play.html?exam=${ch.id}"
           class="flex items-center gap-4 p-4 bg-background rounded-2xl border border-border hover:border-primary/30 hover:shadow-sm transition-all active:scale-[0.98]">
          <div class="w-10 h-10 rounded-xl bg-muted grid place-items-center text-xs font-extrabold text-muted-foreground">${String(i + 1).padStart(2, '0')}</div>
          <div class="flex-1 min-w-0">
            <p class="font-extrabold text-sm">${ch.label}</p>
            <p class="text-xs text-muted-foreground">${ch.soal || 5} Soal</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-muted-foreground shrink-0"></i>
        </a>
      `).join('');

      const overlay = document.getElementById('chapter-overlay');
      const modal   = document.getElementById('chapter-modal');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          modal.style.transform = 'translateX(-50%) translateY(0)';
        });
      });
      if (window.lucide) lucide.createIcons();
    }

    function closeChapterModal() {
      const overlay = document.getElementById('chapter-overlay');
      const modal   = document.getElementById('chapter-modal');
      modal.style.transform = 'translateX(-50%) translateY(100%)';
      setTimeout(() => overlay.classList.add('hidden'), 400);
    }

    window.addEventListener('DOMContentLoaded', () => {
      bootPage('quiz');
    });
  </script>
</body>
</html>
