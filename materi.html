<p class="text-muted-foreground">Iklan adalah teks atau media yang bertujuan untuk membujuk, merayu, dan mengajak orang lain agar tertarik pada barang atau jasa yang ditawarkan.</p>

<h4 class="font-extrabold text-base mt-4 mb-2">Unsur-unsur Iklan (Prinsip AIDA)</h4>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Attention (Perhatian):</strong> Iklan harus bisa menarik perhatian khalayak di pandangan pertama.</li>
  <li><strong>Interest (Minat):</strong> Setelah perhatian didapat, iklan memancing minat konsumen untuk tahu lebih lanjut.</li>
  <li><strong>Desire (Keinginan):</strong> Menggugah keinginan konsumen untuk memiliki barang atau memakai jasa tersebut.</li>
  <li><strong>Action (Tindakan):</strong> Mendorong konsumen melakukan tindakan nyata, seperti membeli atau mendaftar.</li>
</ul>

<h4 class="font-extrabold text-base mt-4 mb-2">Jenis-jenis Iklan</h4>
<p class="font-bold text-sm mt-2">Berdasarkan Tujuan:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Iklan Komersial:</strong> Bertujuan mencari keuntungan finansial dengan promosi barang/jasa.</li>
  <li><strong>Iklan Non-Komersial:</strong> Bertujuan mengedukasi, seperti iklan layanan masyarakat (contoh: iklan antinarkoba).</li>
</ul>
<p class="font-bold text-sm mt-2">Berdasarkan Media:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

<p class="text-muted-foreground">Teks berita adalah teks yang melaporkan kejadian, peristiwa, atau informasi mengenai sesuatu yang baru saja terjadi. Sifat utama berita harus <strong>Faktual</strong> (benar-benar terjadi secara fakta, bukan karangan) dan <strong>Aktual</strong> (hangat, baru saja terjadi, sedang ramai dibicarakan).</p>

<h4 class="font-extrabold text-base mt-4 mb-2">Unsur-unsur Berita (5W+1H)</h4>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Apa (What):</strong> Peristiwa apa yang terjadi?</li>
  <li><strong>Di mana (Where):</strong> Lokasi kejadian.</li>
  <li><strong>Kapan (When):</strong> Waktu kejadian.</li>
  <li><strong>Siapa (Who):</strong> Orang-orang yang terlibat dalam peristiwa.</li>
  <li><strong>Mengapa (Why):</strong> Penyebab atau alasan kejadian.</li>
  <li><strong>Bagaimana (How):</strong> Proses atau kronologi peristiwa tersebut bisa terjadi.</li>

<ol class="list-decimal pl-5 space-y-1 text-muted-foreground">
  <li><strong>Kepala Berita (Lead):</strong> Bagian paling penting di awal teks. Berisi inti utama peristiwa dan langsung menjawab unsur Apa, Di mana, Kapan, Siapa.</li>
  <li><strong>Tubuh Berita (Body):</strong> Penjelasan detail dari peristiwa. Bagian ini menguraikan unsur Mengapa dan Bagaimana.</li>
  <li><strong>Ekor Berita:</strong> Informasi pendukung yang sifatnya tambahan (tidak terlalu krusial).</li>
</ol>

<h4 class="font-extrabold text-base mt-4 mb-2">Ciri-ciri Teks Berita</h4>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

      'ppan-bab3': {
        title: 'Bab 3',
        content: `<h4 class="font-extrabold text-base mb-2">A. Konsep Harmoni dalam Keberagaman</h4>
<p class="text-muted-foreground">Mewujudkan harmoni dalam keberagaman merupakan kunci stabilitas nasional. Nilai-nilai Pancasila harus menjadi pedoman dalam berpikir, bersikap, dan bertindak agar tercipta rasa saling menghormati dan kerja sama antarkelompok masyarakat.</p>

<p class="font-bold text-sm mt-3">1. Cara Mewujudkan Harmoni</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Membangun kesadaran diri bahwa perbedaan adalah keniscayaan.</li>
  <li>Menghargai setiap perbedaan yang ada di masyarakat.</li>
  <li>Bersikap toleransi terhadap keyakinan dan pendapat orang lain.</li>
  <li>Memiliki keterampilan bermusyawarah untuk mencapai mufakat.</li>
  <li>Memberikan keteladanan dalam bersikap adil dan menghormati sesama.</li>
  <li>Bersikap adil tanpa memandang latar belakang suku, agama, ras, atau golongan.</li>
</ul>

<p class="font-bold text-sm mt-3">2. Manfaat Menjaga Harmoni</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Menumbuhkan kesadaran diri, sikap menghargai perbedaan, dan keterampilan bermusyawarah.</li>
  <li>Memperkuat persatuan dan kesatuan bangsa.</li>
  <li>Meningkatkan pemahaman, penghormatan terhadap perbedaan, toleransi, dan solidaritas sosial.</li>
  <li>Mendorong kerja sama (kolaborasi) di berbagai bidang kehidupan.</li>
  <li>Meningkatkan keamanan, kesejahteraan, dan keadilan sosial.</li>
  <li>Menjamin keberlangsungan hidup yang lebih baik dan harmonis.</li>
</ul>

<p class="font-bold text-sm mt-3">3. Faktor Pendorong Harmoni</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Adanya nilai-nilai budaya yang menghargai perbedaan.</li>
  <li>Struktur sosial yang adil dan inklusif.</li>
  <li>Pembangunan infrastruktur yang merata dan mempertemukan berbagai kelompok.</li>
</ul>

<p class="font-bold text-sm mt-3">4. Faktor Penghambat Harmoni</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Egoisme:</strong> Mementingkan diri sendiri.</li>
  <li><strong>Etnosentrisme:</strong> Menganggap budaya sendiri paling unggul.</li>
  <li><strong>Eksklusivisme:</strong> Menutup diri dari kelompok lain.</li>
  <li><strong>Fanatisme:</strong> Keyakinan berlebihan yang merendahkan pihak lain.</li>
  <li><strong>Diskriminasi:</strong> Perlakuan berbeda berdasarkan identitas kelompok.</li>
</ul>

<h4 class="font-extrabold text-base mt-5 mb-2">B. Identifikasi Potensi dan Penyebab Konflik</h4>
<p class="font-bold text-sm mt-2">1. Definisi Konflik</p>
<p class="text-muted-foreground">Berdasarkan Undang-Undang Nomor 7 Tahun 2012 tentang Penanganan Konflik Sosial (sebagaimana diubah dengan UU No. 12 Tahun 2012), konflik adalah perseteruan dan/atau benturan fisik dengan kekerasan antara dua kelompok masyarakat atau lebih yang berlangsung dalam waktu tertentu dan berdampak luas. Konflik dapat mengakibatkan disintegrasi sosial, mengganggu stabilitas nasional, dan menghambat pembangunan nasional.</p>

<p class="font-bold text-sm mt-2">2. Tujuan Identifikasi Konflik</p>
<p class="text-muted-foreground">Mengidentifikasi potensi konflik sangat penting sebagai upaya pencegahan (mitigasi) dini, merencanakan komunikasi antarkelompok yang toleran, serta mempersiapkan diri untuk hidup berdampingan (berbaur) di tengah masyarakat yang beragam.</p>

<p class="font-bold text-sm mt-2">3. Faktor Penyebab Konflik</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Perbedaan tingkat pendidikan yang menimbulkan kesenjangan cara pandang.</li>
  <li>Ketimpangan sosial dan ekonomi yang mencolok.</li>
  <li>Perbedaan pandangan dan kepentingan politik.</li>
  <li>Perbedaan budaya, etnis, atau identitas suku.</li>
  <li>Ketidakadilan sosial dalam kehidupan bermasyarakat.</li>
</ul>

<h4 class="font-extrabold text-base mt-5 mb-2">C. Strategi Mengatasi Konflik (Resolusi Konflik)</h4>
<p class="text-muted-foreground">Resolusi konflik adalah cara individu atau kelompok untuk menyelesaikan masalah secara sukarela.</p>

<p class="font-bold text-sm mt-3">1. Metode Penyelesaian Konflik</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Dialog atau Musyawarah Mufakat:</strong> Penyelesaian melalui perundingan untuk mencapai kata sepakat yang didasari prinsip kekeluargaan.</li>
  <li><strong>Mediasi:</strong> Penyelesaian konflik yang difasilitasi oleh pihak ketiga yang netral (mediator) yang keputusannya tidak mengikat.</li>
  <li><strong>Negosiasi:</strong> Perundingan langsung antara pihak-pihak yang berkonflik untuk mencapai kesepakatan bersama.</li>
  <li><strong>Arbitrase:</strong> Penyelesaian konflik melalui pihak ketiga (arbiter) yang keputusannya bersifat mengikat.</li>
</ul>

<p class="font-bold text-sm mt-3">2. Landasan Hukum dan Tujuan Penanganan Konflik</p>
<p class="text-muted-foreground">Berdasarkan Pasal 3 Undang-Undang Nomor 7 Tahun 2012, penanganan konflik bertujuan untuk:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Menciptakan kondisi aman, tenteram, dan damai dalam kehidupan masyarakat.</li>
  <li>Memelihara dan meningkatkan toleransi serta kerukunan antarwarga.</li>
  <li>Memelihara fungsi pemerintahan agar tetap berjalan efektif.</li>
  <li>Melindungi jiwa, harta benda, dan sarana umum.</li>
  <li>Memulihkan kondisi fisik dan mental masyarakat pascakonflik.</li>
  <li>Memberikan perlindungan dan pemenuhan hak bagi korban konflik.</li>
</ul>

<p class="font-bold text-sm mt-3">3. Peran Serta dalam Penyelesaian Konflik</p>
<p class="text-muted-foreground">Upaya penyelesaian konflik memerlukan keterlibatan semua pihak secara bertanggung jawab:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Individu & Keluarga:</strong> Berperan sebagai mediator kecil di lingkungannya, menghargai perbedaan pendapat, membiasakan musyawarah, menyelesaikan perselisihan secara bertanggung jawab, dan mengembangkan sikap toleransi.</li>
  <li><strong>Masyarakat:</strong> Menghormati perbedaan suku, bahasa, adat istiadat, mengakui persamaan derajat/harkat/martabat manusia, serta hak asasi setiap warga negara.</li>
  <li><strong>Negara:</strong> Berkewajiban menjaga perdamaian/keamanan nasional, berpartisipasi dalam proses demokrasi, menghargai, melindungi, dan menegakkan HAM, serta mengedepankan musyawarah.</li>
</ul>

<p class="font-bold text-sm mt-3">4. Gagasan Solutif untuk Mencegah Konflik</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Meningkatkan penghargaan terhadap keberagaman di semua lini masyarakat.</li>
  <li>Memberi kesempatan yang sama kepada seluruh kelompok tanpa diskriminasi.</li>

<p class="font-bold text-sm mt-2">Pengertian Negara</p>
<p class="text-muted-foreground">Negara adalah suatu daerah teritorial yang rakyatnya diperintah oleh sejumlah pejabat dan menuntut ketaatan warga negaranya melalui kekuasaan yang sah.</p>

<h4 class="font-extrabold text-base mt-5 mb-2">2. Integrasi Nasional</h4>
<p class="font-bold text-sm mt-2">A. Pengertian Integrasi Nasional</p>
<p class="text-muted-foreground">Integrasi nasional adalah proses mempersatukan berbagai komponen masyarakat yang beragam (suku, budaya, agama, ras, dan golongan) untuk mencapai tujuan bersama. Tujuannya adalah untuk menjaga keutuhan dan kedaulatan Negara Kesatuan Republik Indonesia.</p>

<p class="font-bold text-sm mt-2">B. Faktor Pendorong, Penguat, dan Penghambat Integrasi Nasional</p>
<p class="font-bold text-xs text-muted-foreground mt-1">1. Faktor Penguat Keutuhan NKRI</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Sumpah Pemuda (1928).</li>
  <li>Pancasila sebagai ideologi negara.</li>
  <li>Pedoman konstitusi Undang-Undang Dasar 1945.</li>
  <li>Keberagaman sebagai identitas nasional dan kekuatan bangsa.</li>
</ul>

<p class="font-bold text-xs text-muted-foreground mt-1">2. Faktor Pendorong Integrasi</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

  <li>Konsensus nasional dalam simbol negara (Bhinneka Tunggal Ika).</li>

<p class="font-bold text-xs text-muted-foreground mt-1">3. Faktor Penghambat Integrasi</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

<h4 class="font-extrabold text-base mt-5 mb-2">3. ATHG (Ancaman, Tantangan, Hambatan, dan Gangguan)</h4>
<p class="text-muted-foreground">ATHG is various factors or situations that can endanger, obstruct, or disrupt the survival of Pancasila ideology and NKRI.</p>

<p class="font-bold text-sm mt-2">Ancaman</p>
<p class="text-muted-foreground">Setiap usaha dan kegiatan yang dinilai membahayakan kedaulatan negara, keutuhan wilayah, dan keselamatan bangsa:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Ancaman Militer:</strong> Agresi bersenjata, invasi, pemberontakan bersenjata.</li>
  <li><strong>Ancaman Nonmiliter:</strong> Krisis ekonomi, serangan siber, pandemi.</li>
  <li><strong>Ancaman Hibrida:</strong> Kombinasi militer dan nonmiliter (misal: konflik sosial SARA, perebutan sumber daya ekonomi).</li>

<p class="font-bold text-sm mt-2">Tantangan</p>
<p class="text-muted-foreground">Situasi yang memerlukan usaha khusus untuk diatasi agar tidak mengancam keutuhan bangsa:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

<p class="font-bold text-sm mt-2">Gangguan</p>

<h4 class="font-extrabold text-base mt-5 mb-2">4. Bentuk Negara</h4>
<p class="font-bold text-sm mt-2">a. Negara Kesatuan</p>
<p class="text-muted-foreground">Negara yang tersusun tunggal dan tidak ada negara di dalam negara. Kedaulatan sepenuhnya di tangan pemerintah pusat. Ciri-ciri: memiliki satu pemerintah pusat, hukum nasional berlaku di seluruh wilayah, satu kepala negara, satu konstitusi, otonomi daerah terbatas.</p>
<p class="text-muted-foreground"><strong>Indonesia sebagai Negara Kesatuan:</strong> Sesuai Pasal 1 UUD NRI 1945. Menganut <strong>asas desentralisasi</strong> (otonomi daerah), kecuali 6 urusan pemerintah pusat: Politik luar negeri, Pertahanan, Keamanan, Hukum (yustisi), Agama, Moneter &amp; Fiskal. Negara juga mengakui masyarakat hukum adat (Pasal 18B ayat 2). Contoh: Indonesia, Jepang, Prancis.</p>

<p class="font-bold text-sm mt-2">b. Negara Serikat (Federasi)</p>
<p class="text-muted-foreground">Terdiri dari beberapa negara bagian yang bergabung membentuk pemerintahan federal. Kekuasaan terbagi antara pusat (federal) dan negara bagian. Contoh: AS, Jerman, Malaysia, India.</p>

<h4 class="font-extrabold text-base mt-5 mb-2">5. Bentuk Pemerintahan</h4>
<p class="font-bold text-sm mt-2">Berdasarkan Pelaksana &amp; Mekanisme:</p>

  <li><strong>Demokrasi:</strong> Kekuasaan tertinggi di tangan rakyat.</li>

<p class="font-bold text-sm mt-2">Berdasarkan Distribusi Kekuasaan:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

</ul>

<h4 class="font-extrabold text-base mt-5 mb-2">6. Sistem Pemerintahan</h4>
<p class="font-bold text-sm mt-2">a. Sistem Pemerintahan Presidensial</p>
<p class="text-muted-foreground">Presiden menjabat kepala negara sekaligus kepala pemerintahan, mengangkat menteri, dan bertanggung jawab langsung pada rakyat. Kedudukan lembaga eksekutif, legislatif, dan yudikatif independen. Contoh: AS, Filipina, Indonesia.</p>

<p class="font-bold text-sm mt-2">b. Sistem Pemerintahan Parlementer</p>
<p class="text-muted-foreground">Parlemen berkedudukan sangat tinggi. Kepala negara (Raja/Presiden) hanya simbol, sedangkan pemerintahan dijalankan Perdana Menteri. Kabinet bertanggung jawab kepada parlemen. Contoh: Inggris, Jepang, Malaysia.</p>

<h4 class="font-extrabold text-base mt-5 mb-2">7. Sikap Warga Negara terhadap Pelaksanaan Sistem Pemerintahan RI</h4>
<p class="text-muted-foreground">Sikap yang harus dilakukan warga negara:</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li>Mendukung kebijakan pemerintah yang menyejahterakan rakyat.</li>
  <li>Berpartisipasi aktif dalam Pemilu dan pembangunan nasional.</li>
  <li>Memberikan kritik konstruktif dan melakukan kontrol sosial.</li>
  <li>Menjunjung tinggi persatuan, kesatuan, dan kerukunan di tengah keberagaman.</li>
  <li>Mematuhi hukum dan peraturan negara.</li>
</ul>

<h4 class="font-extrabold text-base mt-5 mb-2">8. Lembaga Negara dan Wewenangnya</h4>
<p class="text-muted-foreground">Berdasarkan UUD 1945, kekuasaan negara dibagi menjadi tiga ranah (Trias Politica):</p>

<p class="font-bold text-sm mt-3">Eksekutif</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>Presiden:</strong> Kepala negara sekaligus kepala pemerintahan, menjalankan undang-undang, dan memegang kekuasaan pemerintahan.</li>
</ul>

<p class="font-bold text-sm mt-3">Legislatif</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">
  <li><strong>MPR (Majelis Permusyawaratan Rakyat):</strong> Mengubah dan menetapkan UUD 1945; melantik Presiden dan Wakil Presiden.</li>
  <li><strong>DPR (Dewan Perwakilan Rakyat):</strong> Membentuk undang-undang; menyusun anggaran negara (APBN); mengawasi pemerintah.</li>
  <li><strong>DPD (Dewan Perwakilan Daerah):</strong> Mengajukan usulan terkait otonomi daerah; memberikan pertimbangan kepada DPR.</li>

<p class="font-bold text-sm mt-3">Yudikatif</p>
<ul class="list-disc pl-5 space-y-1 text-muted-foreground">

    function openMateriModal(id) {
      const data = MATERI_DATA[id];
      if (!data) return;
      document.getElementById('materi-modal-title').textContent = data.title;
      document.getElementById('materi-modal-body').innerHTML = data.content;
      const overlay = document.getElementById('materi-overlay');
      const modal   = document.getElementById('materi-modal');
      document.body.style.overflow = 'hidden';
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          modal.style.transform = 'translateX(-50%) translateY(0)';
        });
      });
      resetSheet();
      if (window.lucide) lucide.createIcons();
    }

    function closeMateriModal() {
      document.body.style.overflow = '';
      const overlay = document.getElementById('materi-overlay');
      const modal   = document.getElementById('materi-modal');
      modal.style.transform = 'translateX(-50%) translateY(100%)';
      setTimeout(() => overlay.classList.add('hidden'), 400);
    }

    /* ── Draggable bottom sheet ── */
    const sheetHandle = document.getElementById('materi-handle');
    const sheetBody   = document.getElementById('materi-modal-body');

    const SHEET_COLLAPSED = 55; // vh
    const SHEET_EXPANDED  = 88; // vh

    let sheetDragging = false;
    let sheetStartY   = 0;
    let sheetStartH   = SHEET_COLLAPSED;

    function resetSheet() {
      sheetBody.style.maxHeight = SHEET_COLLAPSED + 'vh';
      sheetBody.style.transition = 'max-height 0.4s cubic-bezier(0.32,0.72,0,1)';
    }

    function sheetDragStart(e) {
      const modal = document.getElementById('materi-modal');
      if (modal.style.transform.includes('translateY(100%)')) return;
      sheetDragging = true;
      sheetStartY = e.touches ? e.touches[0].clientY : e.clientY;
      const cur = sheetBody.style.maxHeight;
      sheetStartH = cur ? parseFloat(cur) : SHEET_COLLAPSED;
      sheetBody.style.transition = 'none';
    }

    function sheetDragMove(e) {
      if (!sheetDragging) return;
      e.preventDefault();
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      const delta = sheetStartY - y; // positive = dragging up
      const newH = Math.min(SHEET_EXPANDED, Math.max(SHEET_COLLAPSED, sheetStartH + delta / window.innerHeight * 100));
      sheetBody.style.maxHeight = newH + 'vh';
    }

    function sheetDragEnd() {
      if (!sheetDragging) return;
      sheetDragging = false;
      sheetBody.style.transition = 'max-height 0.4s cubic-bezier(0.32,0.72,0,1)';
      const cur = parseFloat(sheetBody.style.maxHeight) || SHEET_COLLAPSED;
      if (cur >= SHEET_COLLAPSED + (SHEET_EXPANDED - SHEET_COLLAPSED) / 2) {
        sheetBody.style.maxHeight = SHEET_EXPANDED + 'vh';
      } else {
        sheetBody.style.maxHeight = SHEET_COLLAPSED + 'vh';
      }
    }

    sheetHandle.addEventListener('touchstart', sheetDragStart, { passive: false });
    sheetHandle.addEventListener('touchmove',  sheetDragMove,  { passive: false });
    sheetHandle.addEventListener('touchend',   sheetDragEnd);
    sheetHandle.addEventListener('mousedown',  sheetDragStart);
    document.addEventListener('mousemove', sheetDragMove);
    document.addEventListener('mouseup',   sheetDragEnd);

    window.addEventListener('DOMContentLoaded', () => {
      bootPage('materi');
    });
  </script>
